.badge-draft{background:#F3F4F6;color:#6B7280;}

.badge-approved{background:#D1FAE5;color:#065F46;}

.form-group{

.modal-overlay{

.modal-header{

}
.modal-title{
  font-size:20px;
  font-weight:800;
  color:var(--navy);
}
.modal-close{
  width:32px;
  height:32px;
  border-radius:6px;
  border:none;
  background:var(--bg);
  color:var(--text2);

  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;

.modal-close:hover{
  background:var(--border);
}
.modal-body{
  padding:24px;
}
.modal-footer{
  padding:20px 24px;

  justify-content:flex-end;
}
.pricing-suggestion{
  background:#FEF3C7;
  border:1px solid #FCD34D;
  border-radius:8px;
  padding:12px 16px;
  margin-top:8px;
  font-size:13px;
  color:#92400E;
}
.pricing-suggestion strong{
  font-family:'DM Mono',monospace;
  color:#78350F;
}
.empty-state{
  text-align:center;
  padding:60px 20px;
}
.empty-state-icon{
  font-size:64px;
  margin-bottom:16px;
  opacity:0.3;
}
.empty-state-title{
  font-size:20px;
  font-weight:700;
  color:var(--text);
  margin-bottom:8px;
}
.empty-state-text{
  color:var(--text2);

}
@media (max-width:768px){
  .line-item,.line-item-header{
    grid-template-columns:1fr;
    gap:8px;
  }
  .remove-btn{
    margin-top:8px;

}

  #est-pdf-frame { display: block !important; }

.pricing-box{

.suggested-price-row{

// ── Generate & print a client-facing PDF estimate ────────────────────────────
function printEstimate(estimate){
  const lineTotal=(estimate.lineItems||[]).reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const finalTotal=estimate.overrideTotal!=null&&estimate.overrideTotal!==''
    ?parseFloat(estimate.overrideTotal)||lineTotal
    :lineTotal;
  const isOverridden=estimate.overrideTotal!=null&&parseFloat(estimate.overrideTotal)!==lineTotal;

  const validUntil=()=>{
    const d=new Date(estimate.created);
    d.setDate(d.getDate()+(parseInt(estimate.validDays)||30));
    return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  };

// ── Smart pricing: match by project type NAME (case-insensitive) ──────────────
function calculateSmartPricing(projectTypeName,sqft,historicalJobs,schedulerProjectTypes){
  if(!historicalJobs||historicalJobs.length===0||!sqft||sqft<=0) return null;
  const sqftNum=parseFloat(sqft);
  if(!sqftNum) return null;

  // Build a name→id map from the scheduler's project types
  const nameToIds={};
  (schedulerProjectTypes||[]).forEach(pt=>{
    const key=(pt.name||'').toLowerCase().trim();
    if(!nameToIds[key]) nameToIds[key]=[];
    nameToIds[key].push(pt.id);
  });

  // Also do a loose keyword match for interior/exterior/commercial
  const KEYWORD_MAP={
    interior:['interior','int','inside','indoor'],
    exterior:['exterior','ext','outside','outdoor'],
    commercial:['commercial','comm','office','store','retail'],
  };

  const matchesType=(job)=>{
    const ptName=(projectTypeName||'').toLowerCase().trim();
    // Direct name match against scheduler project types
    const matchIds=nameToIds[ptName]||[];
    if(matchIds.length>0&&matchIds.includes(job.projectTypeId)) return true;
    // Keyword match — find scheduler types whose name contains the keyword
    const keywords=KEYWORD_MAP[ptName]||[ptName];
    return (schedulerProjectTypes||[]).some(pt=>{
      if(!job.projectTypeId||job.projectTypeId!==pt.id) return false;
      return keywords.some(kw=>(pt.name||'').toLowerCase().includes(kw));
    });
  };

  const relevant=historicalJobs.filter(j=>{
    // Use any job that has a contract amount and sqft — completed, contracted, active all count
    const amt=parseFloat(j.contractAmount)||0;
    const sf=parseFloat(j.sqft)||0;
    if(amt<=0||sf<=0) return false;
    return matchesType(j);
  });

  if(relevant.length===0) return null;

  const pricesPerSqft=relevant.map(j=>(parseFloat(j.contractAmount)||0)/(parseFloat(j.sqft)||1));
  pricesPerSqft.sort((a,b)=>a-b);
  const min=pricesPerSqft[0];
  const max=pricesPerSqft[pricesPerSqft.length-1];
  const avg=pricesPerSqft.reduce((a,b)=>a+b,0)/pricesPerSqft.length;
  // Suggested = avg, nudged slightly above median for new jobs
  const mid=pricesPerSqft[Math.floor(pricesPerSqft.length/2)];
  const suggested=((avg+mid)/2)*sqftNum;

  return{
    min:min*sqftNum,
    max:max*sqftNum,
    avg:avg*sqftNum,
    suggested:Math.round(suggested/5)*5, // round to nearest $5
    count:relevant.length,
    jobs:relevant.slice(0,5).map(j=>({name:j.name||j.address||'Job',amount:j.contractAmount,sqft:j.sqft}))
  };
}

// ── Login Page ────────────────────────────────────────────────────────────────
function LoginPage({onLogin,schedulerUsers}){
  const[username,setUsername]=useState('');
  const[password,setPassword]=useState('');
  const[error,setError]=useState('');

  const tryLogin=()=>{
    const u=username.trim();
    const p=password.trim();
    if(!u||!p){setError('Please enter your username and password.');return;}
    // 1. Check hardcoded admins (case-insensitive username, exact password)
    const hard=ADMINS.find(a=>a.username.toLowerCase()===u.toLowerCase()&&a.password===p);
    if(hard){onLogin(hard);return;}
    // 2. Fallback: users loaded from Railway (in case passwords changed in scheduler)
    const rail=(schedulerUsers||[]).find(a=>(a.username||'').toLowerCase()===u.toLowerCase()&&a.password===p&&a.role==='ADMIN');
    if(rail){onLogin({username:rail.username,name:rail.name});return;}
    setError('Invalid username or password. Use the same credentials as the Scheduler app.');
  };

  const onKey=e=>{if(e.key==='Enter')tryLogin();};

  return h('div',{style:{
    minHeight:'100vh',background:'linear-gradient(135deg,#0A1F4D 0%,#1A3A7A 60%,#F47B20 100%)',
    display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'
  }},
    h('div',{style:{
      background:'#fff',borderRadius:'16px',padding:'40px 36px',
      width:'100%',maxWidth:'400px',
      boxShadow:'0 24px 64px rgba(10,31,77,0.35)'
    }},
      h('div',{style:{textAlign:'center',marginBottom:'28px'}},
        h('img',{src:LOGIN_LOGO,alt:"Anaya's",style:{width:'320px',height:'auto',objectFit:'contain',marginBottom:'16px'}}),
        h('h1',{style:{fontSize:'22px',fontWeight:800,color:'#0A1F4D',letterSpacing:'-0.5px',margin:0}},'Estimates'),
        
      ),
      h('div',{style:{marginBottom:'16px'}},
        h('label',{style:{display:'block',fontSize:'12px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#4A5568',marginBottom:'6px'}},'Username'),
        h('input',{
          className:'form-input',
          value:username,
          onChange:e=>{setUsername(e.target.value);setError('');},
          onKeyDown:onKey,
          placeholder:'Enter your username',
          autoFocus:true,
          autoComplete:'username',
          style:{fontSize:'15px'}
        })
      ),
      h('div',{style:{marginBottom:'20px'}},
        h('label',{style:{display:'block',fontSize:'12px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'#4A5568',marginBottom:'6px'}},'Password'),
        h('input',{
          className:'form-input',
          type:'password',
          value:password,
          onChange:e=>{setPassword(e.target.value);setError('');},
          onKeyDown:onKey,
          placeholder:'Enter your password',
          autoComplete:'current-password',
          style:{fontSize:'15px'}
        })
      ),
      error&&h('div',{style:{
        background:'#FEE2E2',border:'1px solid #FECACA',borderRadius:'8px',
        padding:'10px 14px',fontSize:'13px',color:'#991B1B',marginBottom:'16px'
      }},error),
      h('button',{
        className:'btn btn-primary',
        onClick:tryLogin,
        style:{width:'100%',fontSize:'15px',padding:'13px'}
      },'Sign In'),
      h('p',{style:{textAlign:'center',fontSize:'12px',color:'#A0AEC0',marginTop:'20px',marginBottom:0}},
        'Same credentials as the Scheduler'
      )
    )
  );
}

// ── Property Lookup Page ─────────────────────────────────────────────────────
function PropertyLookupPage({schedulerData}){
  const h=React.createElement;
  const [address,setAddress]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [result,setResult]=React.useState(null);
  const [error,setError]=React.useState('');
  const [suggestions,setSuggestions]=React.useState([]);
  const [showSugg,setShowSugg]=React.useState(false);
  const [acLoading,setAcLoading]=React.useState(false);
  const timerRef=React.useRef(null);
  const wrapRef=React.useRef(null);

  // Dismiss suggestions on outside click
  React.useEffect(()=>{
    const handler=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target)){setShowSugg(false);}};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const fetchSugg=async(q)=>{
    if(q.length<4){setSuggestions([]);setShowSugg(false);return;}
    setAcLoading(true);
    try{
      const res=await fetch('https://nominatim.openstreetmap.org/search?'+new URLSearchParams({
        q:q+', California',format:'json',addressdetails:1,limit:6,countrycodes:'us',
        viewbox:'-118.95,33.4,-117.0,34.35',bounded:0,
      }),{headers:{'Accept-Language':'en-US','User-Agent':'AnayaEstimates/1.0'}});
      const data=await res.json();
      const filtered=data.filter(r=>r.address&&(r.address.road||r.address.house_number));
      setSuggestions(filtered);
      setShowSugg(filtered.length>0);
    }catch{setSuggestions([]);}
    setAcLoading(false);
  };

  const onInput=e=>{
    const v=e.target.value;
    setAddress(v);setResult(null);setError('');
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>fetchSugg(v),320);
  };

  const pickSugg=r=>{
    const a=r.address||{};
    const num=a.house_number||'';
    const road=a.road||'';
    const city=a.city||a.town||a.village||a.suburb||'';
    const state=a.state_code||'CA';
    const zip=a.postcode||'';
    const full=[num+' '+road,[city,state,zip].filter(Boolean).join(', ')].filter(s=>s.trim()).join(', ');
    setAddress(full);setSuggestions([]);setShowSugg(false);
    doLookupBrowser(full);
  };

  const doLookupBrowser=async(addr)=>{
    const a=(addr||address).trim();
    if(!a){setError('Enter an address');return;}
    setLoading(true);setResult(null);setError('');

    const parts=a.split(',').map(s=>s.trim());
    const streetAddr=parts[0]||a;
    const zip=(parts.find(p=>/\d{5}/.test(p))||'').replace(/\D/g,'').slice(0,5);

    // Detect county from zip
    const z=zip||'';const al=a.toLowerCase();
    let county='riverside';
    if(/^92[2-5]/.test(z)||/^928[0-3]/.test(z)) county='riverside';
    else if(/^92[6-9]/.test(z)) county='orange';
    else if(/^917/.test(z)||((/^92[3-5]/.test(z))&&(al.includes('san bernardino')||al.includes('fontana')||al.includes('ontario')||al.includes('rancho cucamonga')||al.includes('rialto')||al.includes('victorville')))) county='sanbernardino';
    else if(/^90/.test(z)||/^91[0-8]/.test(z)) county='la';

    let det={};let source='';
    try{
      if(county==='la'){
        // LA County Assessor — direct browser call (CORS enabled)
        const url='https://assessor.lacounty.gov/commondata/OutputData/SearchExistingAccounts?'+
          new URLSearchParams({houseNum:streetAddr.replace(/[^0-9]/g,'').slice(0,6),
            streetName:streetAddr.replace(/^[0-9]+\s*/,'').split(' ')[0],unitNum:'',searchType:'address'});
        const res=await fetch(url,{mode:'cors'});
        if(res.ok){
          const data=await res.json();
          const rec=(data.Data||[])[0];
          if(rec){
            if(rec.SQFTmain)   det.sqft=parseInt(rec.SQFTmain);
            if(rec.SQFTtotal)  det.sqftTotal=parseInt(rec.SQFTtotal);
            if(rec.LotSqFt||rec.LotSize) det.lotSqft=parseInt(rec.LotSqFt||rec.LotSize);
            if(rec.YrBlt||rec.YearBuilt) det.yearBuilt=parseInt(rec.YrBlt||rec.YearBuilt);
            if(rec.Stories||rec.NoOfStories) det.stories=parseInt(rec.Stories||rec.NoOfStories);
            if(rec.Bedrooms||rec.Beds) det.bedrooms=parseInt(rec.Bedrooms||rec.Beds);
            if(rec.Bathrooms||rec.Baths) det.bathrooms=parseFloat(rec.Bathrooms||rec.Baths);
            if(rec.RoofType||rec.RoofCover) det.roofType=rec.RoofType||rec.RoofCover;
            if(rec.ExtWall||rec.ExteriorWall) det.extWall=rec.ExtWall||rec.ExteriorWall;
            if(rec.Pool) det.pool=rec.Pool==='Y'||rec.Pool==='Yes'||rec.Pool===1;
            if(rec.UseType||rec.UseCode||rec.LandUse) det.useType=rec.UseType||rec.UseCode||rec.LandUse;
            if(rec.APN||rec.AssessorParcelNum) det.apn=rec.APN||rec.AssessorParcelNum;
            if(rec.Garage||rec.GarageType) det.garage=rec.Garage||rec.GarageType;
            if(rec.FirePlace||rec.Fireplaces) det.fireplaces=rec.FirePlace||rec.Fireplaces;
            source='LA County Assessor';
          }
        }
      } else {
        // ArcGIS — direct browser call (CORS enabled on public services)
        const ARCGIS={
          riverside: {base:'https://gis.rctlma.org/arcgis/rest/services/Assessor/Parcels/MapServer/',layer:'0',addrField:'SITUS_ADDR'},
          orange:    {base:'https://services1.arcgis.com/P5Mv5GY5S66M8Z1Q/arcgis/rest/services/Parcels_Public/FeatureServer/',layer:'0',addrField:'SitusAddress'},
          sanbernardino:{base:'https://gis.sbcounty.gov/sbcgis/rest/services/Assessor/Parcels/MapServer/',layer:'0',addrField:'SITE_ADDRESS'},
        };
        const cfg=ARCGIS[county];
        if(cfg){
          const houseNum=streetAddr.replace(/\D/g,'').slice(0,6);
          const firstWord=streetAddr.replace(/^\d+\s*/,'').trim().toUpperCase().split(' ')[0];
          const where=`${cfg.addrField} LIKE '${houseNum} ${firstWord}%'`;
          const url=cfg.base+cfg.layer+'/query?'+new URLSearchParams({where,outFields:'*',f:'json',resultRecordCount:1});
          const res=await fetch(url,{mode:'cors'});
          if(res.ok){
            const data=await res.json();
            const feat=(data.features||[])[0];
            if(feat&&feat.attributes){
              const at=feat.attributes;
              const g=(keys)=>{for(const k of keys){const v=at[k];if(v!=null&&v!==0&&v!=='')return v;}return undefined;};
              det.sqft      =parseInt(g(['SQ_FOOTAGE','BldgSqFt','BLDG_SQFT','SQFT'])||0)||undefined;
              det.lotSqft   =parseInt(g(['LOT_SQFT','LotSqFt','LOTSQFT','LOT_SIZE'])||0)||undefined;
              det.yearBuilt =parseInt(g(['YR_BLT','YearBuilt','YEAR_BUILT'])||0)||undefined;
              det.bedrooms  =parseInt(g(['BEDROOMS','Bedrooms','BED_ROOMS'])||0)||undefined;
              det.bathrooms =parseFloat(g(['BATHROOMS','Bathrooms','BATH'])||0)||undefined;
              det.stories   =parseInt(g(['STORIES','Stories','NO_STORIES'])||0)||undefined;
              det.apn       =String(g(['APN','PARCEL_NO','PARCELNO','PARCEL_ID'])||'').trim()||undefined;
              det.useType   =g(['USECODE','UseCode','USE_CODE','LAND_USE']);
              det.extWall   =g(['EXT_WALL','ExtWall','EXTERIOR_WALL','WALL_TYPE']);
              det.roofType  =g(['ROOF_TYPE','RoofType','ROOF_COVER']);
              det.garage    =g(['GARAGE','GarageType','GARAGE_TYPE']);
              det.fireplaces=g(['FIREPLACES','FirePlace','FIRE_PLACES']);
              Object.keys(det).forEach(k=>det[k]===undefined&&delete det[k]);
              source=county.charAt(0).toUpperCase()+county.slice(1)+' County ArcGIS';
            }
          }
        }
      }
    }catch(e){
      console.error('Lookup error:',e);
    }

    if(Object.keys(det).length>0){
      setResult({...det,county,source,fullAddress:a});
    } else {
      setError('No property data found. The '+county.toUpperCase()+' County API may be temporarily unavailable. Try refreshing and searching again, or check that the address is in a supported county.');
    }
    setLoading(false);
  };

  const fmtNum=n=>n!=null?Number(n).toLocaleString():null;
  const fmtSqft=n=>n?Number(n).toLocaleString()+' sqft':null;
  const roofMap={'F':'Flat','S':'Shingle','T':'Tile','C':'Concrete Tile','M':'Metal','W':'Wood Shake','G':'Gravel'};
  const wallMap={'S':'Stucco','W':'Wood','B':'Brick','C':'Concrete','V':'Vinyl','A':'Aluminum','T':'Stone'};

  // Smart pricing suggestion from scheduler history
  const getSmartPrice=()=>{
    if(!result||!schedulerData) return null;
    const jobs=(schedulerData.jobs||[]).filter(j=>j.status==='completed'&&j.sqft>0&&j.contractAmount>0);
    if(jobs.length<3) return null;
    const rates=jobs.map(j=>parseFloat(j.contractAmount)/j.sqft).filter(r=>r>0&&r<500);
    if(rates.length<3) return null;
    const avg=rates.reduce((s,r)=>s+r,0)/rates.length;
    const sqftNum=result.sqft||result.sqftTotal;
    if(!sqftNum) return null;
    return {low:Math.round(avg*0.85*sqftNum),high:Math.round(avg*1.15*sqftNum),rate:avg.toFixed(2),jobs:rates.length};
  };
  const smartPrice=getSmartPrice();

  return h('div',{style:{maxWidth:'760px',margin:'0 auto',padding:'32px 20px'}},
    // Header
    h('div',{style:{marginBottom:'28px'}},
      h('h1',{style:{fontSize:'24px',fontWeight:900,color:'var(--navy,#0A1F4D)',margin:'0 0 6px'}},'🏠 Property Lookup'),
      h('p',{style:{fontSize:'14px',color:'#6b7280',margin:0}},'Search any Riverside, LA, Orange, or San Bernardino County address to see property details, size, and smart pricing estimates.')
    ),

    // Search bar
    h('div',{ref:wrapRef,style:{position:'relative',marginBottom:'24px'}},
      h('div',{style:{display:'flex',gap:'10px'}},
        h('div',{style:{flex:1,position:'relative'}},
          h('span',{style:{position:'absolute',left:'14px',top:'50%',transform:'translateY(-50%)',fontSize:'16px',pointerEvents:'none'}},'🔍'),
          h('input',{
            value:address,
            onChange:onInput,
            onKeyDown:e=>{if(e.key==='Enter'){setShowSugg(false);doLookupBrowser();}},
            placeholder:'Start typing an address — e.g. 1234 Main St, Riverside',
            style:{
              width:'100%',boxSizing:'border-box',
              padding:'13px 14px 13px 42px',
              border:'2px solid #e5e7eb',borderRadius:'10px',
              fontSize:'15px',fontFamily:'Outfit,sans-serif',outline:'none',
              transition:'border .15s',
            },
            onFocus:e=>{e.target.style.borderColor='#0A1F4D';},
            onBlur:e=>{e.target.style.borderColor='#e5e7eb';}
          })
        ),
        h('button',{
          onClick:()=>doLookupBrowser(),
          disabled:loading||!address.trim(),
          style:{
            padding:'13px 24px',background:'#0A1F4D',color:'#fff',
            border:'none',borderRadius:'10px',fontSize:'14px',fontWeight:700,
            cursor:loading||!address.trim()?'not-allowed':'pointer',
            opacity:loading||!address.trim()?0.6:1,whiteSpace:'nowrap'
          }
        },loading?'Looking up…':'Look Up')
      ),
      // Autocomplete dropdown
      showSugg&&suggestions.length>0&&h('div',{style:{
        position:'absolute',top:'100%',left:0,right:'0',marginTop:'4px',
        background:'#fff',border:'1.5px solid #e5e7eb',borderRadius:'10px',
        boxShadow:'0 8px 24px rgba(0,0,0,.12)',zIndex:200,overflow:'hidden'
      }},
        suggestions.slice(0,6).map((r,i)=>{
          const a=r.address||{};
          const num=a.house_number||'';
          const road=a.road||'';
          const city=a.city||a.town||a.village||a.suburb||'';
          const zip=a.postcode||'';
          const label=[num+' '+road,[city,zip].filter(Boolean).join(' ')].filter(s=>s.trim()).join(', ');
          return h('div',{key:i,
            onClick:()=>pickSugg(r),
            style:{
              padding:'10px 16px',cursor:'pointer',fontSize:'13px',
              borderTop:i>0?'1px solid #f3f4f6':'none',
              display:'flex',alignItems:'center',gap:'10px'
            },
            onMouseEnter:e=>{e.currentTarget.style.background='#f9fafb';},
            onMouseLeave:e=>{e.currentTarget.style.background='transparent';}
          },
            h('span',{style:{fontSize:'15px',flexShrink:0}},'📍'),
            h('div',null,
              h('div',{style:{fontWeight:600,color:'#111827'}},label||r.display_name?.split(',').slice(0,2).join(','))
            )
          );
        })
      )
    ),

    // Error
    error&&h('div',{style:{
      background:'#fef2f2',border:'1px solid #fecaca',borderRadius:'10px',
      padding:'12px 16px',marginBottom:'20px',fontSize:'13px',color:'#dc2626',
      display:'flex',alignItems:'center',gap:'8px'
    }},h('span',null,'⚠ '),error),

    // Result card
    result&&h('div',{style:{
      background:'#fff',border:'1.5px solid #e5e7eb',borderRadius:'16px',
      overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,.06)'
    }},

      // Card header
      h('div',{style:{background:'#0A1F4D',padding:'20px 24px',color:'#fff'}},
        h('div',{style:{fontSize:'19px',fontWeight:900,marginBottom:'3px'}},
          result.fullAddress||address
        ),
        h('div',{style:{fontSize:'12px',opacity:.7,display:'flex',gap:'12px',flexWrap:'wrap'}},
          result.county&&h('span',null,'📍 '+result.county.toUpperCase()+' COUNTY'),
          result.source&&h('span',null,'Source: '+result.source),
          result.apn&&h('span',null,'APN: '+result.apn)
        )
      ),

      // Key stats bar
      h('div',{style:{
        display:'grid',
        gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',
        borderBottom:'1px solid #f3f4f6'
      }},
        [
          result.bedrooms&&{icon:'🛏',label:'Beds',value:fmtNum(result.bedrooms)},
          result.bathrooms&&{icon:'🚿',label:'Baths',value:fmtNum(result.bathrooms)},
          result.sqft&&{icon:'📐',label:'Sqft',value:Number(result.sqft).toLocaleString()},
          result.lotSqft&&{icon:'🌿',label:'Lot',value:Number(result.lotSqft).toLocaleString()+' sf'},
          result.yearBuilt&&{icon:'🏗',label:'Built',value:String(result.yearBuilt)},
          result.stories&&{icon:'🏢',label:'Stories',value:String(result.stories)},
        ].filter(Boolean).map((s,i)=>h('div',{key:i,style:{
          padding:'16px 12px',textAlign:'center',
          borderRight:'1px solid #f3f4f6'
        }},
          h('div',{style:{fontSize:'20px',marginBottom:'2px'}},s.icon),
          h('div',{style:{fontFamily:'DM Mono,monospace',fontSize:'17px',fontWeight:900,color:'#0A1F4D',lineHeight:1.1}},s.value),
          h('div',{style:{fontSize:'10px',fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.4px',marginTop:'3px'}},s.label)
        ))
      ),

      // Property details grid
      h('div',{style:{padding:'20px 24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
        [
          result.useType&&{label:'Property Type',value:result.useType,icon:'🏠'},
          result.extWall&&{label:'Exterior',value:wallMap[result.extWall]||result.extWall,icon:'🧱'},
          result.roofType&&{label:'Roof',value:roofMap[result.roofType]||result.roofType,icon:'🏠'},
          result.garage&&{label:'Garage',value:result.garage,icon:'🚗'},
          result.pool&&{label:'Pool',value:'Yes',icon:'💦'},
          result.fireplaces&&{label:'Fireplaces',value:String(result.fireplaces),icon:'🔥'},
        ].filter(Boolean).map((d,i)=>h('div',{key:i,style:{
          display:'flex',alignItems:'center',gap:'10px',
          padding:'10px 14px',background:'#f9fafb',borderRadius:'8px'
        }},
          h('span',{style:{fontSize:'18px',flexShrink:0}},d.icon),
          h('div',null,
            h('div',{style:{fontSize:'10px',fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.4px'}},d.label),
            h('div',{style:{fontSize:'14px',fontWeight:700,color:'#1f2937',marginTop:'1px'}},d.value)
          )
        ))
      ),

      // Lead paint warning
      result.yearBuilt&&result.yearBuilt<1978&&h('div',{style:{
        margin:'0 24px 20px',padding:'10px 14px',
        background:'#fef9c3',border:'1px solid #fde047',borderRadius:'8px',
        display:'flex',alignItems:'center',gap:'8px',fontSize:'12px',color:'#713f12'
      }},
        h('span',{style:{fontSize:'16px'}},'⚠️'),
        h('span',null,'Built '+result.yearBuilt+' — may contain lead paint. Recommend discussing prep procedures with client.')
      ),

      // Smart pricing section
      h('div',{style:{padding:'0 24px 24px'}},
        smartPrice
          ?h('div',{style:{
              background:'linear-gradient(135deg,#fffbeb,#fef3c7)',
              border:'1.5px solid #fcd34d',borderRadius:'12px',padding:'16px 18px'
            }},
              h('div',{style:{fontSize:'11px',fontWeight:800,textTransform:'uppercase',letterSpacing:'.5px',color:'#92400e',marginBottom:'10px'}},'💡 Smart Pricing Estimate'),
              h('div',{style:{display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap'}},
                h('div',null,
                  h('div',{style:{fontSize:'11px',color:'#92400e',marginBottom:'2px'}},'Suggested range'),
                  h('div',{style:{fontFamily:'DM Mono,monospace',fontSize:'22px',fontWeight:900,color:'#065f46'}},
                    '$'+smartPrice.low.toLocaleString()+' – $'+smartPrice.high.toLocaleString()
                  )
                ),
                h('div',{style:{fontSize:'11px',color:'#92400e',lineHeight:'1.6'}},
                  'Based on '+smartPrice.jobs+' completed jobs avg $'+smartPrice.rate+'/sqft',
                  h('br'),
                  result.sqft?' × '+Number(result.sqft).toLocaleString()+' sqft':''
                )
              )
            )
          :schedulerData
            ?h('div',{style:{
                background:'#f9fafb',border:'1px dashed #e5e7eb',borderRadius:'12px',
                padding:'14px 16px',fontSize:'12px',color:'#9ca3af',textAlign:'center'
              }},
                '📊 Smart pricing requires completed jobs with sqft data in the Scheduler'
              )
            :null
      )
    )
  );
}


function App(){
  const[session,setSession]=useState(null); // {username,name}
  const[activePage,setActivePage]=useState('estimates'); // 'estimates' | 'lookup'
  const[estimates,setEstimates]=useState([]);
  const[showNewModal,setShowNewModal]=useState(false);
  const[viewEstimate,setViewEstimate]=useState(null);
  const[schedulerData,setSchedulerData]=useState(null);
  const[schedulerStatus,setSchedulerStatus]=useState('loading');
  const[loading,setLoading]=useState(true);
  const[searchQuery,setSearchQuery]=useState('');
  const[filterStatus,setFilterStatus]=useState('all');
  const[sortBy,setSortBy]=useState('date');
  const[showDataQuality,setShowDataQuality]=useState(false);
  const[templates,setTemplates]=useState(()=>{try{return JSON.parse(localStorage.getItem('anaya_est_templates')||'[]');}catch(e){return [];}});

  // Check for ?view= param — allow viewing shared estimates without login
  const viewParam=new URLSearchParams(window.location.search).get('view');

  useEffect(()=>{
    // Restore session from sessionStorage
    try{
      const s=sessionStorage.getItem('anaya_est_session');
      if(s) setSession(JSON.parse(s));
    }catch(e){}
    loadAll();
  },[]);

  useEffect(()=>{
    if(viewParam&&estimates.length>0){
      const est=estimates.find(e=>e.id===viewParam);
      if(est) setViewEstimate(est);
    }
  },[estimates,viewParam]);

  const handleLogin=(user)=>{
    setSession(user);
    try{ sessionStorage.setItem('anaya_est_session',JSON.stringify(user)); }catch(e){}
  };

  const handleLogout=()=>{
    setSession(null);
    try{ sessionStorage.removeItem('anaya_est_session'); }catch(e){}
  };

  const loadAll=async()=>{
    try{
      const res=await fetch(`${RAILWAY_URL}/load?key=${ESTIMATES_KEY}`);
      if(res.ok){
        const json=await res.json();
        const d=json.data||json;
        setEstimates(d.estimates||[]);
      }
    }catch(e){ console.warn('Estimates load failed',e); }

    try{
      const res=await fetch(`${RAILWAY_URL}/load?key=${SCHEDULER_KEY}`);
      if(res.ok){
        const json=await res.json();
        const d=json.data||json;
        setSchedulerData(d);
        setSchedulerStatus('online');
      } else {
        setSchedulerStatus('offline');
      }
    }catch(e){
      console.warn('Scheduler fetch failed',e);
      setSchedulerStatus('offline');
    }

    setLoading(false);
  };

  const saveEstimates=async(newEstimates)=>{
    setEstimates(newEstimates);
    try{
      await fetch(`${RAILWAY_URL}/save`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({key:ESTIMATES_KEY,data:{estimates:newEstimates,lastSync:new Date().toISOString()},savedBy:session?session.name:'Estimates App'})
      });
    }catch(e){ console.warn('Save failed',e); }
  };

  const[editingEstimate,setEditingEstimate]=useState(null);

  const addEstimate=(est)=>{
    if(editingEstimate){
      // Edit mode — update in place
      const updated=estimates.map(e=>e.id===editingEstimate.id?{...e,...est}:e);
      saveEstimates(updated);
      if(viewEstimate&&viewEstimate.id===editingEstimate.id) setViewEstimate(v=>({...v,...est}));
      setEditingEstimate(null);
      setShowNewModal(false);
      return;
    }
    const maxNum=estimates.reduce((max,e)=>{
      const n=parseInt(e.estNumber||'0');
      return n>max?n:max;
    },0);
    const newEst={...est,id:Date.now().toString(),created:new Date().toISOString(),status:'draft',estNumber:String(maxNum+1).padStart(3,'0')};
    saveEstimates([...estimates,newEst]);
    setShowNewModal(false);
  };
  
  const saveTemplate=(est,name)=>{
    const t={id:Date.now().toString(),name,lineItems:est.lineItems,notes:est.notes,validDays:est.validDays,projectType:est.projectType,savedAt:new Date().toISOString()};
    const next=[...templates,t];
    setTemplates(next);
    try{localStorage.setItem('anaya_est_templates',JSON.stringify(next));}catch(e){}
  };
  const deleteTemplate=(id)=>{
    const next=templates.filter(t=>t.id!==id);
    setTemplates(next);
    try{localStorage.setItem('anaya_est_templates',JSON.stringify(next));}catch(e){}
  };

  const addClientNote=(estId,text,author)=>{
    const note={id:Date.now().toString(),text,author,at:new Date().toISOString()};
    const est=estimates.find(e=>e.id===estId);
    if(!est) return;
    const notes=[...(est.internalNotes||[]),note];
    updateEstimate(estId,{internalNotes:notes});
  };

  const duplicateEstimate=(est)=>{
    const maxNum=estimates.reduce((max,e)=>{
      const n=parseInt(e.estNumber||'0');
      return n>max?n:max;
    },0);
    const newEst={
      ...est,
      id:Date.now().toString(),
      created:new Date().toISOString(),
      status:'draft',
      estNumber:String(maxNum+1).padStart(3,'0'),
      customerName:est.customerName+' (copy)',
      sentDate:null,
      approvedDate:null,
    };
    saveEstimates([...estimates,newEst]);
  };

  const updateEstimate=(id,updates)=>{
    const updated=estimates.map(e=>e.id===id?{...e,...updates}:e);
    saveEstimates(updated);
    if(viewEstimate&&viewEstimate.id===id) setViewEstimate(v=>({...v,...updates}));
  };

  const deleteEstimate=(id)=>{
    if(confirm('Delete this estimate?')){
      saveEstimates(estimates.filter(e=>e.id!==id));
      setViewEstimate(null);
    }
  };

  // If there's a ?view= link, show the estimate directly (no login needed for clients)
  if(viewParam&&!session){
    if(loading) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',fontFamily:'Outfit,sans-serif',color:'#4A5568'}},'Loading estimate…');
    const est=estimates.find(e=>e.id===viewParam);
    if(!est) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',fontFamily:'Outfit,sans-serif',color:'#4A5568'}},'Estimate not found.');
    // Mark as viewed if currently sent (first open)
    if(est.status==='sent'){
      // Fire-and-forget — update Railway in background
      (async()=>{
        try{
          const RAILWAY_URL='https://anaya-s-calendar-production.up.railway.app';
          const loadRes=await fetch(RAILWAY_URL+'/load?key=anaya_estimates_v1');
          const loaded=await loadRes.json();
          const ests=Array.isArray(loaded)?loaded:(loaded.estimates||[]);
          const already=ests.find(e=>e.id===est.id);
          if(already&&already.status==='sent'){
            const updated=ests.map(e=>e.id===est.id
              ?{...e,status:'viewed',firstViewedAt:e.firstViewedAt||new Date().toISOString(),viewCount:(e.viewCount||0)+1}
              :e
            );
            await fetch(RAILWAY_URL+'/save?key=anaya_estimates_v1',{
              method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify(updated)
            });
          } else if(already){
            // Just increment viewCount even if already viewed/approved
            const updated=ests.map(e=>e.id===est.id
              ?{...e,viewCount:(e.viewCount||0)+1,lastViewedAt:new Date().toISOString()}
              :e
            );
            await fetch(RAILWAY_URL+'/save?key=anaya_estimates_v1',{
              method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify(updated)
            });
          }
        }catch(err){}
      })();
    }
    // Show read-only client view
    return h(ClientEstimateView,{estimate:est});
  }

  // Not logged in — show login page
  if(!session) return h(LoginPage,{onLogin:handleLogin,schedulerUsers:(schedulerData&&schedulerData.users)||[]});

  const historicalJobs=(schedulerData&&schedulerData.jobs)||[];
  const schedulerProjectTypes=(schedulerData&&schedulerData.projectTypes)||[];

  const statusBadge=()=>{
    if(schedulerStatus==='loading') return h('span',{className:'scheduler-status scheduler-loading'},'⏳ Connecting…');
    if(schedulerStatus==='online'){
      const priced=historicalJobs.filter(j=>(j.contractAmount||0)>0&&(j.sqft||0)>0).length;
      const missingSqft=historicalJobs.filter(j=>(j.contractAmount||0)>0&&!(j.sqft>0));
      const missingAmount=historicalJobs.filter(j=>(j.sqft||0)>0&&!(j.contractAmount>0));
      const issues=missingSqft.length+missingAmount.length;
      return h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
        h('span',{className:'scheduler-status scheduler-online',style:{cursor:'pointer'},onClick:()=>setShowDataQuality(v=>!v)},
          '✓ Scheduler live · '+priced+' priced'+( issues>0?' · ⚠ '+issues+' incomplete':'')
        ),
        issues>0&&h('span',{
          onClick:()=>setShowDataQuality(v=>!v),
          style:{fontSize:'11px',color:'#92400e',cursor:'pointer',fontWeight:700}
        },showDataQuality?'▲':'▼')
      );
    }
    return h('span',{className:'scheduler-status scheduler-offline'},'⚠ Scheduler offline');
  };

  return h('div',{className:'app'},
    h('nav',{className:'navbar'},
      h('div',{className:'nav-brand'},
        h('img',{src:ANAYA_LOGO,alt:"Anaya's",style:{height:'96px',objectFit:'contain',marginRight:'0px'}})
      ),
      h('div',{className:'nav-links',style:{display:'flex',gap:'2px',flex:1,padding:'0 16px'}},
        h('button',{
          onClick:()=>setActivePage('estimates'),
          style:{padding:'6px 14px',borderRadius:'6px',fontSize:'13px',fontWeight:600,
            background:activePage==='estimates'?'rgba(255,255,255,.15)':'transparent',
            color:activePage==='estimates'?'#fff':'rgba(255,255,255,.65)',
            border:'none',cursor:'pointer',transition:'all .15s'}
        },'📋 Estimates'),
        h('button',{
          onClick:()=>setActivePage('lookup'),
          style:{padding:'6px 14px',borderRadius:'6px',fontSize:'13px',fontWeight:600,
            background:activePage==='lookup'?'rgba(255,255,255,.15)':'transparent',
            color:activePage==='lookup'?'#fff':'rgba(255,255,255,.65)',
            border:'none',cursor:'pointer',transition:'all .15s'}
        },'🏠 Property Lookup')
      ),
      h('div',{className:'nav-actions'},
        statusBadge(),
        h('div',{style:{width:'1px',height:'24px',background:'rgba(255,255,255,0.15)',margin:'0 4px'}}),
        h('span',{style:{fontSize:'13px',fontWeight:600,color:'rgba(255,255,255,0.85)'}},session.name),
        h('button',{
          className:'btn btn-ghost',
          onClick:handleLogout,
          style:{fontSize:'12px',padding:'6px 14px',border:'1px solid rgba(255,255,255,0.25)'}
        },'Sign Out'),
        activePage==='estimates'&&h('button',{
          className:'btn btn-primary',
          onClick:()=>setShowNewModal(true),
          style:{fontWeight:700,letterSpacing:'-0.2px'}
        },'+ New Estimate')
      )
    ),
    h('div',{className:'container'},
      activePage==='lookup'?h(PropertyLookupPage,{schedulerData}):h('div',null,
      h('div',{className:'header'},
        h('h1',{className:'header-title'},'Estimates'),
        h('p',{className:'header-subtitle'},'Smart pricing powered by your real job history from the scheduler')
      ),

      // ── Data Quality Panel ──
      showDataQuality&&schedulerStatus==='online'&&(()=>{
        const missingSqft=historicalJobs.filter(j=>(j.contractAmount||0)>0&&!(j.sqft>0));
        const missingAmount=historicalJobs.filter(j=>!(j.contractAmount>0)&&j.name);
        const allGood=missingSqft.length===0&&missingAmount.length===0;
        return h('div',{style:{
          background:'#fffbeb',border:'1.5px solid #fde68a',borderRadius:'12px',
          padding:'16px 20px',marginBottom:'20px'
        }},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:allGood?0:'14px'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
              h('span',{style:{fontSize:'18px'}},allGood?'✅':'⚠️'),
              h('span',{style:{fontWeight:800,fontSize:'14px',color:allGood?'#065f46':'#92400e'}},
                allGood
                  ?'All jobs have complete pricing data'
                  :(missingSqft.length+missingAmount.length)+' job'+(missingSqft.length+missingAmount.length===1?'':'s')+' with incomplete data — smart pricing affected'
              )
            ),
            h('button',{
              onClick:()=>setShowDataQuality(false),
              style:{background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:'#9ca3af',padding:'0 4px',lineHeight:1}
            },'×')
          ),
          !allGood&&h('div',{style:{display:'grid',gridTemplateColumns:missingSqft.length>0&&missingAmount.length>0?'1fr 1fr':'1fr',gap:'12px'}},
            missingSqft.length>0&&h('div',null,
              h('div',{style:{fontSize:'11px',fontWeight:800,textTransform:'uppercase',letterSpacing:'.5px',color:'#b45309',marginBottom:'8px'}},
                '📐 Missing sqft · '+missingSqft.length+' job'+(missingSqft.length===1?'':'s')+' — fix in Scheduler'
              ),
              h('div',{style:{display:'flex',flexDirection:'column',gap:'4px',maxHeight:'180px',overflowY:'auto'}},

// ── Client-facing read-only estimate view (accessed via share link, no login) ─
function SignaturePad({onSign}){
  const canvasRef=React.useRef(null);
  const drawing=React.useRef(false);
  const lastPos=React.useRef(null);

  const getPos=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  };

  const start=(e)=>{
    e.preventDefault();
    drawing.current=true;
    lastPos.current=getPos(e,canvasRef.current);
  };
  const move=(e)=>{
    e.preventDefault();
    if(!drawing.current) return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    const pos=getPos(e,canvas);
    ctx.beginPath();
    ctx.strokeStyle='#0A1F4D';
    ctx.lineWidth=2.5;
    ctx.lineCap='round';
    ctx.moveTo(lastPos.current.x,lastPos.current.y);
    ctx.lineTo(pos.x,pos.y);
    ctx.stroke();
    lastPos.current=pos;
  };
  const stop=()=>{ drawing.current=false; };
  const clear=()=>{
    const canvas=canvasRef.current;
    canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  };
  const save=()=>{
    const canvas=canvasRef.current;
    const dataUrl=canvas.toDataURL('image/png');
    // Check not blank
    const ctx=canvas.getContext('2d');
    const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    const hasContent=data.some((v,i)=>i%4===3&&v>0);
    if(!hasContent){ alert('Please sign before submitting.'); return; }
    onSign(dataUrl);
  };

  return h('div',null,
    h('p',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'8px'}},'Sign in the box below using your mouse or finger:'),
    h('div',{className:'sig-wrap'},
      h('canvas',{
        ref:canvasRef,width:560,height:150,
        style:{width:'100%',height:'150px'},
        onMouseDown:start,onMouseMove:move,onMouseUp:stop,onMouseLeave:stop,
        onTouchStart:start,onTouchMove:move,onTouchEnd:stop
      })
    ),
    h('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}},
      h('button',{
        className:'btn btn-ghost',onClick:clear,
        style:{fontSize:'12px',padding:'6px 12px'}
      },'Clear'),
      h('button',{
        className:'btn btn-primary',onClick:save,
        style:{fontSize:'12px',padding:'6px 16px',marginLeft:'auto'}
      },'Submit Signature ✓')
    )
  );
}

    ?parseFloat(estimate.overrideTotal)||subTotal:subTotal;

  const[signed,setSigned]=useState(!!estimate.signature);
  const[sigData,setSigData]=useState(estimate.signature||null);
  const[sigDate,setSigDate]=useState(estimate.signedAt||null);

    const d=new Date(estimate.created);

        estimate.address&&h('div',{style:{fontSize:'13px',color:'var(--text3)',marginTop:'2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},estimate.address)
      ),
      h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px',flexShrink:0}},
        h('span',{className:'card-badge '+(STATUS_COLORS[estimate.status]||'badge-draft')},
          STATUS_LABEL[estimate.status]||estimate.status
        ),
        needsFollowUp&&h('span',{
          style:{fontSize:'10px',fontWeight:700,color:'#92400e',background:'#fef3c7',borderRadius:'20px',padding:'2px 8px',border:'1px solid #fde68a',whiteSpace:'nowrap'}
        },'⏰ Follow up'),
        estimate.status==='viewed'&&h('span',{
          style:{fontSize:'10px',fontWeight:700,color:'#1d4ed8',background:'#dbeafe',borderRadius:'20px',padding:'2px 8px',border:'1px solid #bfdbfe',whiteSpace:'nowrap'}
        },'👁 '+(estimate.viewCount>1?estimate.viewCount+'× viewed':'Viewed'))
      )
    ),
    h('div',{style:{marginTop:'12px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
      h('div',null,
        h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'Total'+(isOverridden?' (custom)':'')),
        h('div',{style:{fontFamily:'DM Mono,monospace',fontSize:'20px',fontWeight:'800',color:isOverridden?'#7c3aed':'var(--navy)'}},fmt(finalTotal)),
        isOverridden&&h('div',{style:{fontSize:'11px',color:'var(--text3)',textDecoration:'line-through'}},fmt(lineTotal)+' suggested')
      ),
      h('div',{style:{fontSize:'12px',color:'var(--text3)',textAlign:'right'}},
        estimate.projectType&&h('div',{style:{fontWeight:700,color:'var(--orange)',marginBottom:'2px'}},estimate.projectType),
        estimate.sqft>0&&h('div',{style:{color:'var(--text3)',marginBottom:'2px'}},parseFloat(estimate.sqft).toLocaleString()+' sqft'),
        h('div',null,new Date(estimate.created).toLocaleDateString()),
        estimate.estNumber&&h('div',{style:{fontFamily:'DM Mono,monospace',fontSize:'11px',color:'var(--text3)'}},'#'+estimate.estNumber)
      )
    )
  );
}

// ── New Estimate Modal ────────────────────────────────────────────────────────
function NewEstimateModal({onClose,onSave,historicalJobs,schedulerProjectTypes,templates,onDeleteTemplate,editEstimate}){
  const isEdit=!!editEstimate;

  // ── Category definitions ──
  const CATEGORIES=['Surface Prep','Labor','Materials','Equipment & Misc','Markup / Fees'];
  const UNITS=['sqft','lin ft','hours','gallons','days','each','flat rate','%'];

  // ── Quick-add items per category ──
  const QUICK_ITEMS={
    'Surface Prep':[
      {description:'Pressure washing / cleaning',unit:'sqft',quantity:0,rate:0.15},
      {description:'Masking & surface protection',unit:'flat rate',quantity:1,rate:150},
      {description:'Patching & crack repair',unit:'flat rate',quantity:1,rate:200},
      {description:'Sanding & surface prep',unit:'sqft',quantity:0,rate:0.10},
    ],
    'Labor':[
      {description:'Painting labor',unit:'hours',quantity:0,rate:65},
      {description:'Primer coat application',unit:'sqft',quantity:0,rate:0.18},
      {description:'Finish coat application (per coat)',unit:'sqft',quantity:0,rate:0.22},
      {description:'Trim & detail work',unit:'hours',quantity:0,rate:70},
      {description:'Ceiling painting',unit:'sqft',quantity:0,rate:0.25},
    ],
    'Materials':[
      {description:'Primer (Sherwin-Williams)',unit:'gallons',quantity:0,rate:42},
      {description:'Interior paint (Sherwin-Williams)',unit:'gallons',quantity:0,rate:58},
      {description:'Exterior paint (Sherwin-Williams)',unit:'gallons',quantity:0,rate:65},
      {description:'Masking tape & paper',unit:'flat rate',quantity:1,rate:80},
      {description:'Drop cloths & plastic sheeting',unit:'flat rate',quantity:1,rate:60},
      {description:'Brushes, rollers & supplies',unit:'flat rate',quantity:1,rate:120},
    ],
    'Equipment & Misc':[
      {description:'Sprayer rental',unit:'days',quantity:1,rate:150},
      {description:'Scaffold rental',unit:'days',quantity:1,rate:200},
      {description:'Travel / mobilization',unit:'flat rate',quantity:1,rate:150},
      {description:'Debris disposal',unit:'flat rate',quantity:1,rate:100},
    ],
    'Markup / Fees':[
      {description:'Overhead & profit markup',unit:'%',quantity:15,rate:0},
      {description:'Rush / priority fee',unit:'flat rate',quantity:1,rate:0},
      {description:'Permit fee',unit:'flat rate',quantity:1,rate:0},
    ],
  };

  const defaultItems=[
    {category:'Labor',description:'Painting labor',unit:'hours',quantity:0,rate:65,total:0},
    {category:'Materials',description:'Paint & supplies',unit:'flat rate',quantity:1,rate:0,total:0},
  ];

  // ── State ──
  const[customerName,setCustomerName]=useState(isEdit?editEstimate.customerName||'':'');
  const[customerPhone,setCustomerPhone]=useState(isEdit?editEstimate.customerPhone||'':'');
  const[customerEmail,setCustomerEmail]=useState(isEdit?editEstimate.customerEmail||'':'');
  const[address,setAddress]=useState(isEdit?editEstimate.address||'':'');
  const[sqft,setSqft]=useState(isEdit?String(editEstimate.sqft||''):'');
  const[acSuggestions,setAcSuggestions]=useState([]);
  const[acLoading,setAcLoading]=useState(false);
  const[acOpen,setAcOpen]=useState(false);
  const[sqftSource,setSqftSource]=useState(isEdit&&editEstimate.sqft?'manual':null); // 'auto'|'manual'|'notfound'|null
  const[sqftCounty,setSqftCounty]=useState(null);
  const[propertyDetails,setPropertyDetails]=useState(null);
  // Categories collapsed by default when empty; track manually toggled ones
  const[collapsedCats,setCollapsedCats]=useState({});
  const toggleCat=cat=>setCollapsedCats(prev=>({...prev,[cat]:!prev[cat]}));
  // A category is collapsed if: explicitly toggled, OR has no items and was never toggled open
  const isCatCollapsed=(cat,hasItems)=>{
    if(cat in collapsedCats) return collapsedCats[cat];
    return !hasItems; // default: empty=collapsed, has items=open
  };
  const[sqftLoading,setSqftLoading]=useState(false);
  const acTimerRef=React.useRef(null);
  const acWrapRef=React.useRef(null);

  // Close dropdown on outside click
  React.useEffect(()=>{
    const handler=e=>{if(acWrapRef.current&&!acWrapRef.current.contains(e.target)){setAcOpen(false);}};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  // Nominatim address autocomplete (free, no key)
  const fetchSuggestions=async(q)=>{
    if(q.length<4){setAcSuggestions([]);setAcOpen(false);return;}
    setAcLoading(true);
    try{
      const url='https://nominatim.openstreetmap.org/search?'+new URLSearchParams({
        q:q+', California',
        format:'json',
        addressdetails:1,
        limit:6,
        countrycodes:'us',
        viewbox:'-118.95,33.4,-117.0,34.35',
        bounded:0,
      });
      const res=await fetch(url,{headers:{'Accept-Language':'en-US','User-Agent':'AnayaEstimates/1.0'}});
      const data=await res.json();
      setAcSuggestions(data.filter(r=>r.address&&(r.address.road||r.address.house_number)));
      setAcOpen(data.length>0);
    }catch(e){setAcSuggestions([]);}
    setAcLoading(false);
  };

  const onAddressChange=e=>{
    const v=e.target.value;
    setAddress(v);
    setSqftSource(null);
    clearTimeout(acTimerRef.current);
    acTimerRef.current=setTimeout(()=>fetchSuggestions(v),350);
  };

  const formatAcLabel=(r)=>{
    const a=r.address||{};
    const num=a.house_number||'';
    const road=a.road||'';
    const city=a.city||a.town||a.village||a.suburb||'';
    const state=a.state_code||a.state||'';
    const zip=a.postcode||'';
    const main=[num,road].filter(Boolean).join(' ');
    const sub=[city,state,zip].filter(Boolean).join(', ');
    return{main:main||r.display_name.split(',')[0],sub};
  };

  // ── County detection from zip ────────────────────────────────────────────
  const detectCounty=(zip,addr)=>{
    const z=zip||'';
    const a=(addr||'').toLowerCase();
    // Riverside: 922xx-925xx (core), some 928xx
    if(/^92[2-5]/.test(z)||/^928[0-3]/.test(z)) return 'riverside';
    // Orange: 926xx-928xx (most)
    if(/^92[6-9]/.test(z)) return 'orange';
    // San Bernardino: 917xx, some 923xx-925xx overlap — keyword check
    if(/^917/.test(z)||((/^92[3-5]/.test(z))&&(a.includes('san bernardino')||a.includes('fontana')||a.includes('ontario')||a.includes('rancho cucamonga')||a.includes('rialto')||a.includes('victorville')))) return 'sanbernardino';
    // LA County: 900xx-918xx (bulk), 902xx, Pacific Palisades 90272
    if(/^90/.test(z)||/^91[0-8]/.test(z)) return 'la';
    return null;
  };

  // County metadata for badge + reminder
  const COUNTY_META={
    la:    {label:'LA County',      freq:'monthly',   warn:45},
    orange:{label:'Orange County',  freq:'quarterly', warn:100},
    riverside:{label:'Riverside Co',freq:'quarterly', warn:100},
    sanbernardino:{label:'SB County',freq:'annually', warn:200},
  };

  // ── Per-county lookup functions ───────────────────────────────────────────
  const lookupLA=async(streetAddr)=>{
    const url='https://assessor.lacounty.gov/commondata/OutputData/SearchExistingAccounts?'+
      new URLSearchParams({houseNum:streetAddr.replace(/[^0-9]/g,'').slice(0,6),
        streetName:streetAddr.replace(/^[0-9]+\s*/,'').split(' ')[0],unitNum:'',searchType:'address'});
    const res=await fetch(url,{mode:'cors'});
    if(!res.ok) return null;
    const data=await res.json();
    const rec=(data.Data||[])[0];
    if(!rec) return null;
    // Extract full property details
    const det={};
    if(rec.SQFTmain)   det.sqft=parseInt(rec.SQFTmain);
    if(rec.SQFTtotal)  det.sqftTotal=parseInt(rec.SQFTtotal);
    if(rec.LotSqFt||rec.LotSize) det.lotSqft=parseInt(rec.LotSqFt||rec.LotSize);
    if(rec.YrBlt||rec.YearBuilt) det.yearBuilt=parseInt(rec.YrBlt||rec.YearBuilt);
    if(rec.Stories||rec.NoOfStories) det.stories=parseInt(rec.Stories||rec.NoOfStories);
    if(rec.Bedrooms||rec.Beds) det.bedrooms=parseInt(rec.Bedrooms||rec.Beds);
    if(rec.Bathrooms||rec.Baths) det.bathrooms=parseFloat(rec.Bathrooms||rec.Baths);
    if(rec.RoofType||rec.RoofCover) det.roofType=rec.RoofType||rec.RoofCover;
    if(rec.ExtWall||rec.ExteriorWall) det.extWall=rec.ExtWall||rec.ExteriorWall;
    if(rec.Pool) det.pool=rec.Pool==='Y'||rec.Pool==='Yes'||rec.Pool===1;
    if(rec.UseType||rec.UseCode||rec.LandUse) det.useType=rec.UseType||rec.UseCode||rec.LandUse;
    if(rec.APN||rec.AssessorParcelNum) det.apn=rec.APN||rec.AssessorParcelNum;
    if(rec.Garage||rec.GarageType) det.garage=rec.Garage||rec.GarageType;
    if(rec.FirePlace||rec.Fireplaces) det.fireplaces=rec.FirePlace||rec.Fireplaces;
    if(Object.keys(det).length>0) setPropertyDetails({...det,county:'la',source:'LA County Assessor'});
    return det.sqft||null;
  };

  const lookupArcGIS=async(baseUrl,layer,streetField,sqftField,streetAddr)=>{
    const houseNum=streetAddr.replace(/\D/g,'').slice(0,6);
    const streetName=streetAddr.replace(/^\d+\s*/,'').trim().toUpperCase();
    const where=`${streetField} LIKE '${houseNum} ${streetName.split(' ')[0]}%'`;
    const url=baseUrl+layer+'/query?'+new URLSearchParams({where,outFields:sqftField,f:'json',resultRecordCount:1});
    const res=await fetch(url,{mode:'cors'});
    if(!res.ok) return null;
    const data=await res.json();
    const feat=(data.features||[])[0];
    return feat&&feat.attributes&&feat.attributes[sqftField]?parseInt(feat.attributes[sqftField]):null;
  };

  const lookupOrange=async(streetAddr)=>{
    // OC has ArcGIS public parcel service
    try{
      return await lookupArcGIS(
        'https://services1.arcgis.com/P5Mv5GY5S66M8Z1Q/arcgis/rest/services/Parcels_Public/FeatureServer/',
        '0','SitusAddress','BldgSqFt',streetAddr
      );
    }catch{return null;}
  };

  const lookupRiverside=async(streetAddr)=>{
    // Riverside County public GIS parcels
    try{
      return await lookupArcGIS(
        'https://gis.rctlma.org/arcgis/rest/services/Assessor/Parcels/MapServer/',
        '0','SITUS_ADDR','SQ_FOOTAGE',streetAddr
      );
    }catch{return null;}
  };

  const lookupSanBernardino=async(streetAddr)=>{
    // San Bernardino County ArcGIS parcel service
    try{
      return await lookupArcGIS(
        'https://gis.sbcounty.gov/sbcgis/rest/services/Assessor/Parcels/MapServer/',
        '0','SITE_ADDRESS','BLDG_SQFT',streetAddr
      );
    }catch{return null;}
  };

  // ── Main lookup — calls Railway proxy (handles all counties server-side) ──
  const RAILWAY_URL='https://anaya-s-calendar-production.up.railway.app';
  const lookupSqft=async(fullAddress,county)=>{
    setSqftLoading(true);
    setSqftSource(null);
    setSqftCounty(null);
    setPropertyDetails(null);
    const parts=fullAddress.split(',').map(s=>s.trim());
    const zip=(parts.find(p=>/\d{5}/.test(p))||'').replace(/\D/g,'').slice(0,5);
    try{
      const r=await fetch(RAILWAY_URL+'/property?'+new URLSearchParams({address:parts[0]||fullAddress,zip}));
      if(r.ok){
        const result=await r.json();
        if(result.data){
          const d=result.data;
          setPropertyDetails({...d,county:result.county,source:result.source});
          if(d.sqft&&d.sqft>0){
            setSqft(String(d.sqft));
            setSqftSource('auto');
            setSqftCounty(result.county);
            try{const key='anaya_sqft_checked_'+result.county;
              if(!localStorage.getItem(key)) localStorage.setItem(key,new Date().toISOString().slice(0,10));}catch{}
          }else{
            setSqftSource('notfound');
          }
        }else{
          setSqftSource('notfound');
        }
      }else{
        setSqftSource('notfound');
      }
    }catch(e){
      setSqftSource('notfound');
    }
    setSqftLoading(false);
  };

  // Freshness check — how stale is each county's data?
  const getSqftFreshnessWarning=(county)=>{
    if(!county) return null;
    const meta=COUNTY_META[county];
    if(!meta) return null;
    try{
      const checked=localStorage.getItem('anaya_sqft_checked_'+county);
      if(!checked) return null;
      const days=Math.floor((Date.now()-new Date(checked).getTime())/(864e5));
      if(days>meta.warn) return 'Data may be stale ('+days+'d since last lookup) — verify sqft for this '+meta.label+' property';
    }catch{}
    return null;
  };

  const selectSuggestion=(r)=>{
    const a=r.address||{};
    const num=a.house_number||'';
    const road=a.road||'';
    const city=a.city||a.town||a.village||a.suburb||'';
    const state=a.state_code||'CA';
    const zip=a.postcode||'';
    const full=[num+' '+road,[city,state,zip].filter(Boolean).join(', ')].filter(s=>s.trim()).join(', ');
    setAddress(full);
    setAcOpen(false);
    setAcSuggestions([]);
    const county=detectCounty(zip,full);
    if(county) lookupSqft(full,county);
  };
  const[projectType,setProjectType]=useState(isEdit?editEstimate.projectType||'':'');
  const[notes,setNotes]=useState(isEdit?editEstimate.notes||'':'');
  const[validDays,setValidDays]=useState(isEdit?editEstimate.validDays||30:30);
  const[showDeposit,setShowDeposit]=useState(isEdit?editEstimate.showDeposit!==false:false);
  const[depositText,setDepositText]=useState(isEdit?editEstimate.depositText||'50% deposit required':'50% deposit required');
  const[showTerms,setShowTerms]=useState(isEdit?editEstimate.showTerms!==false:false);
  const DEFAULT_TERMS='This estimate is valid for 30 days from the date of issue. Final payment is due upon project completion. All materials and labor are included as described above. Any additional work requested outside this scope will be quoted separately.';
  const[termsText,setTermsText]=useState(isEdit?editEstimate.termsText||DEFAULT_TERMS:DEFAULT_TERMS);
  const[overrideTotal,setOverrideTotal]=useState(isEdit&&editEstimate.overrideTotal?String(editEstimate.overrideTotal):'');
  const[isOverriding,setIsOverriding]=useState(isEdit&&editEstimate.overrideTotal!=null&&editEstimate.overrideTotal!=='');
  const[overrideReason,setOverrideReason]=useState(isEdit?editEstimate.overrideReason||'':'');
  const[lineItems,setLineItems]=useState(()=>{
    if(isEdit&&editEstimate.lineItems?.length) return editEstimate.lineItems.map(li=>({category:li.category||'Labor',unit:li.unit||'flat rate',...li}));
    return defaultItems;
  });
  const[activeQA,setActiveQA]=useState(null); // which quick-add category is open

  const pricing=projectType&&sqft?calculateSmartPricing(projectType,sqft,historicalJobs,schedulerProjectTypes):null;

  useEffect(()=>{
    if(pricing&&pricing.suggested&&!isEdit){
      setLineItems(prev=>{
        const updated=[...prev];
        const laborIdx=updated.findIndex(i=>(i.category||'')===('Labor'));
        if(laborIdx>=0&&(parseFloat(updated[laborIdx].rate)||0)===0){
          // Distribute suggested across labor as a flat rate
          updated[laborIdx]={...updated[laborIdx],unit:'flat rate',quantity:1,rate:pricing.suggested,total:pricing.suggested};
        }
        return updated;
      });
    }
  },[pricing?.suggested]);

  // ── Line item helpers ──
  const addLineItem=(cat)=>{
    setLineItems(l=>[...l,{category:cat||CATEGORIES[0],description:'',unit:'flat rate',quantity:1,rate:0,total:0}]);
  };
  const addQuickItem=(cat,qi)=>{
    const total=qi.unit==='%'?0:(parseFloat(qi.quantity)||0)*(parseFloat(qi.rate)||0);
    setLineItems(l=>[...l,{category:cat,description:qi.description,unit:qi.unit,quantity:qi.quantity,rate:qi.rate,total}]);
    setActiveQA(null);
  };
  const removeLineItem=idx=>setLineItems(l=>l.filter((_,i)=>i!==idx));
  const updateLineItem=(idx,field,value)=>{
    setLineItems(prev=>{
      const updated=[...prev];
      updated[idx]={...updated[idx],[field]:value};
      // Recalc total
      const q=parseFloat(updated[idx].quantity)||0;
      const r=parseFloat(updated[idx].rate)||0;
      if(updated[idx].unit==='%'){
        // % markup calculated at render time, not stored
        updated[idx].total=0;
      } else {
        updated[idx].total=q*r;
      }
      return updated;
    });
  };

  // ── Totals ──
  const subtotal=lineItems
    .filter(i=>i.unit!=='%')
    .reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const markupTotal=lineItems
    .filter(i=>i.unit==='%')
    .reduce((s,i)=>s+subtotal*(parseFloat(i.quantity)||0)/100,0);
  const lineTotal=subtotal+markupTotal;
  const finalTotal=isOverriding&&overrideTotal!==''?parseFloat(overrideTotal)||lineTotal:lineTotal;

  // ── Category subtotals ──
  const catTotals={};
  CATEGORIES.forEach(c=>{
    const items=lineItems.filter(i=>i.category===c);
    catTotals[c]=items.filter(i=>i.unit!=='%').reduce((s,i)=>s+(parseFloat(i.total)||0),0)
      +items.filter(i=>i.unit==='%').reduce((s,i)=>s+subtotal*(parseFloat(i.quantity)||0)/100,0);
  });

  const handleSave=()=>{
    if(!customerName.trim()){alert('Please enter a customer name');return;}
    // Sync markup item totals before saving
    const finalItems=lineItems.map(i=>{
      if(i.unit==='%') return{...i,total:subtotal*(parseFloat(i.quantity)||0)/100};
      return i;
    });
    onSave({
      customerName:customerName.trim(),customerPhone:customerPhone.trim(),
      customerEmail:customerEmail.trim(),address,sqft:parseFloat(sqft)||0,
      projectType,lineItems:finalItems,notes,validDays,
      overrideTotal:isOverriding&&overrideTotal!==''?parseFloat(overrideTotal)||null:null,
      overrideReason:isOverriding?overrideReason:'',
      suggestedTotal:pricing?pricing.suggested:null,
      showDeposit,depositText,showTerms,termsText
    });
  };

  const ptOptions=schedulerProjectTypes.length>0
    ?schedulerProjectTypes.map(pt=>h('option',{key:pt.id,value:pt.name},(pt.icon?pt.icon+' ':'')+pt.name))
    :[h('option',{key:'i',value:'interior'},'Interior'),h('option',{key:'e',value:'exterior'},'Exterior'),h('option',{key:'c',value:'commercial'},'Commercial')];

  // ── Render line items grouped by category ──
  const renderLineItems=()=>
    CATEGORIES.map(cat=>{
      const items=lineItems.map((item,idx)=>({...item,_idx:idx})).filter(i=>i.category===cat);
      const collapsed=isCatCollapsed(cat,items.length>0);
      return h('div',{key:cat,className:'li-category'+(collapsed?' li-cat-collapsed':'')},
        h('div',{className:'li-category-header',style:{cursor:'pointer'},onClick:()=>toggleCat(cat)},
          h('span',null,cat),
          h('span',{className:'li-category-subtotal'},catTotals[cat]>0?fmt(catTotals[cat]):''),
          items.length===0&&!collapsed&&h('span',{style:{fontSize:'10px',fontWeight:500,color:'rgba(255,255,255,.5)',marginLeft:'6px'}},'empty'),
          h('button',{className:'li-cat-toggle','aria-label':'toggle',onClick:e=>{e.stopPropagation();toggleCat(cat);}},
            collapsed?'▶ expand':'▼'
          )
        ),
        !collapsed&&items.length>0&&h('div',{className:'li-col-head'},
          h('span',null,'Description'),h('span',null,'Unit'),h('span',null,'Qty'),
          h('span',null,'Rate'),h('span',null,'Total'),h('span',null,'')
        ),
        ...(!collapsed?items.map(item=>
          h('div',{key:item._idx,className:'li-row'},
            h('input',{
              className:'form-input',style:{fontSize:'13px',padding:'5px 8px'},
              value:item.description,placeholder:'Description…',
              onChange:e=>updateLineItem(item._idx,'description',e.target.value)
            }),
            h('select',{
              className:'li-unit-select',
              value:item.unit||'flat rate',
              onChange:e=>updateLineItem(item._idx,'unit',e.target.value)
            },UNITS.map(u=>h('option',{key:u,value:u},u))),
            h('input',{
              className:'form-input',style:{fontSize:'13px',padding:'5px 6px',textAlign:'right'},
              type:'number',min:0,step:'0.5',
              value:item.quantity,
              onChange:e=>updateLineItem(item._idx,'quantity',e.target.value)
            }),
            h('input',{
              className:'form-input',style:{fontSize:'13px',padding:'5px 6px',textAlign:'right'},
              type:'number',min:0,step:'0.01',placeholder:'0.00',
              value:item.rate,
              onChange:e=>updateLineItem(item._idx,'rate',e.target.value)
            }),
            h('div',{className:'li-math'},
              item.unit==='%'
                ?fmt(subtotal*(parseFloat(item.quantity)||0)/100)
                :fmt(item.total||0)
            ),
            h('button',{className:'remove-btn',onClick:()=>removeLineItem(item._idx)},'×')
          )
        ):[]),
        // Quick-add row — always visible so you can expand a category by adding to it
        !collapsed&&h('div',{className:'li-quick-row',style:{display:'flex',gap:'6px',padding:'6px 10px',background:'#f8fafc',border:'1px solid var(--border)',borderTop:'none',borderRadius:items.length>0?'0':'0 0 8px 8px',flexWrap:'wrap',alignItems:'center'}},

          // Deposit toggle
          h('div',{style:{marginBottom:'10px'}},
