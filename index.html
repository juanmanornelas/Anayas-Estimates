<html lang="en">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0A1F4D;
  --navy-light:#1A3A7A;
  --navy-dark:#050F26;
  --orange:#F47B20;
  --orange-light:#FF9142;
  --orange-dark:#D4620A;
  --bg:#FAFBFC;
  --card:#FFFFFF;
  --border:#E1E4E8;
  --text:#1C2330;
  --text2:#4A5568;
  --text3:#718096;
  --green:#10B981;
  --red:#EF4444;
  --yellow:#F59E0B;
}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.navbar{
  background:var(--navy);
  color:white;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(10,31,77,0.15);
}
.nav-brand{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:20px;
  font-weight:800;
  letter-spacing:-0.5px;
}
.nav-brand-icon{
  width:32px;
  height:32px;
  background:var(--orange);
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
.nav-actions{
  display:flex;
  gap:8px;
}
.btn{
  padding:10px 18px;
  border-radius:8px;
  border:none;
  font-family:'Outfit',sans-serif;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all 0.2s;
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.btn-primary{
  background:var(--orange);
  color:white;
}
.btn-primary:hover{
  background:var(--orange-dark);
  transform:translateY(-1px);
}
.btn-ghost{
  background:transparent;
  color:rgba(255,255,255,0.9);
  border:1px solid rgba(255,255,255,0.2);
}
.btn-ghost:hover{
  background:rgba(255,255,255,0.1);
}
.btn-secondary{
  background:var(--bg);
  color:var(--navy);
}
.btn-secondary:hover{
  background:#E8EBF0;
}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:32px 24px;
  flex:1;
}
.header{
  margin-bottom:32px;
}
.header-title{
  font-size:32px;
  font-weight:800;
  color:var(--navy);
  margin-bottom:8px;
  letter-spacing:-1px;
}
.header-subtitle{
  color:var(--text2);
  font-size:16px;
}
.grid{
  display:grid;
  gap:20px;
}
.grid-2{
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
}
.card{
  background:var(--card);
  border-radius:12px;
  border:1px solid var(--border);
  padding:20px;
  transition:all 0.3s;
}
.card:hover{
  box-shadow:0 4px 20px rgba(10,31,77,0.08);
  transform:translateY(-2px);
}
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}
.card-title{
  font-size:18px;
  font-weight:700;
  color:var(--navy);
}
.card-badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.badge-draft{background:#F3F4F6;color:#6B7280;}
.badge-sent{background:#DBEAFE;color:#1E40AF;}
.badge-viewed{background:#DDD6FE;color:#6D28D9;}
.badge-approved{background:#D1FAE5;color:#065F46;}
.badge-declined{background:#FEE2E2;color:#991B1B;}
.form-group{
  margin-bottom:18px;
}
.form-label{
  display:block;
  font-weight:600;
  font-size:13px;
  color:var(--text2);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.form-input,.form-select{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:8px;
  font-family:'Outfit',sans-serif;
  font-size:15px;
  transition:all 0.2s;
}
.form-input:focus,.form-select:focus{
  outline:none;
  border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(244,123,32,0.1);
}
.line-items{
  margin:24px 0;
}
.line-item{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 40px;
  gap:12px;
  align-items:end;
  padding:12px;
  background:var(--bg);
  border-radius:8px;
  margin-bottom:10px;
  border:1px solid var(--border);
}
.line-item-header{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 40px;
  gap:12px;
  font-size:12px;
  font-weight:700;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:0.5px;
  padding:0 12px 8px;
}
.remove-btn{
  width:36px;
  height:36px;
  border-radius:6px;
  border:1px solid var(--border);
  background:white;
  color:var(--red);
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
}
.remove-btn:hover{
  background:var(--red);
  color:white;
  border-color:var(--red);
}
.totals{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  border-radius:12px;
  padding:24px;
  color:white;
  margin-top:24px;
}
.totals-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.totals-row:last-child{
  border-bottom:none;
  padding-top:16px;
  margin-top:8px;
  font-size:24px;
  font-weight:800;
}
.totals-label{
  font-size:14px;
  opacity:0.8;
}
.totals-value{
  font-family:'DM Mono',monospace;
  font-weight:700;
  font-size:18px;
}
.modal-overlay{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(10,31,77,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:20px;
}
.modal{
  background:white;
  border-radius:16px;
  max-width:600px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(10,31,77,0.3);
}
.modal-header{
  padding:24px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.modal-title{
  font-size:20px;
  font-weight:800;
  color:var(--navy);
}
.modal-close{
  width:32px;
  height:32px;
  border-radius:6px;
  border:none;
  background:var(--bg);
  color:var(--text2);
  cursor:pointer;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-close:hover{
  background:var(--border);
}
.modal-body{
  padding:24px;
}
.modal-footer{
  padding:20px 24px;
  border-top:1px solid var(--border);
  display:flex;
  gap:12px;
  justify-content:flex-end;
}
.pricing-suggestion{
  background:#FEF3C7;
  border:1px solid #FCD34D;
  border-radius:8px;
  padding:12px 16px;
  margin-top:8px;
  font-size:13px;
  color:#92400E;
}
.pricing-suggestion strong{
  font-family:'DM Mono',monospace;
  color:#78350F;
}
.empty-state{
  text-align:center;
  padding:60px 20px;
}
.empty-state-icon{
  font-size:64px;
  margin-bottom:16px;
  opacity:0.3;
}
.empty-state-title{
  font-size:20px;
  font-weight:700;
  color:var(--text);
  margin-bottom:8px;
}
.empty-state-text{
  color:var(--text2);
  margin-bottom:24px;
}
@media (max-width:768px){
  .line-item,.line-item-header{
    grid-template-columns:1fr;
    gap:8px;
  }
  .remove-btn{
    margin-top:8px;
  }
}
@media print {
  body > .app { display: none !important; }
  #est-pdf-frame { display: block !important; }
}
</style>
</head>

/* ── Extra styles for smart pricing & send panel ── */
.pricing-box{
  background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%);
  border:1.5px solid #fcd34d;
  border-radius:10px;
  padding:14px 16px;
  margin:8px 0 16px;
}
.pricing-box-header{
  font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:.6px;color:#92400e;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.pricing-stats{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;
}
.pricing-stat{
  flex:1;min-width:80px;background:white;border-radius:8px;
  padding:8px 10px;text-align:center;border:1px solid #fde68a;
}
.pricing-stat-label{font-size:10px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.4px;}
.pricing-stat-value{font-family:'DM Mono',monospace;font-size:16px;font-weight:800;color:#78350f;margin-top:2px;}
.suggested-price-row{
  display:flex;align-items:center;gap:10px;
  background:white;border-radius:8px;padding:10px 12px;
  border:1.5px solid #fbbf24;
}
.suggested-price-label{font-size:12px;font-weight:700;color:#92400e;white-space:nowrap;}
.suggested-price-value{
  font-family:'DM Mono',monospace;font-size:20px;font-weight:800;color:#065f46;
}
.override-toggle{
  margin-left:auto;font-size:11px;font-weight:700;color:#6366f1;
  background:none;border:1px solid #c7d2fe;border-radius:6px;
  padding:4px 10px;cursor:pointer;white-space:nowrap;
}
.override-toggle:hover{background:#eef2ff;}
.override-active{color:#dc2626;border-color:#fecaca;}
.override-active:hover{background:#fef2f2;}
.override-note{
  font-size:11px;color:#6b7280;margin-top:6px;
  display:flex;align-items:center;gap:4px;
}
.no-history-box{
  background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:10px;
  padding:12px 16px;margin:8px 0 16px;font-size:12px;color:#64748b;
  display:flex;align-items:center;gap:8px;
}
.send-panel{
  background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;
  padding:16px;margin-top:16px;
}
.send-panel-title{
  font-size:12px;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;color:#166534;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.send-method-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.send-method-btn{
  flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);
  background:white;cursor:pointer;text-align:center;transition:all .15s;
  font-family:'Outfit',sans-serif;
}
.send-method-btn:hover{border-color:#22c55e;background:#f0fdf4;}
.send-method-btn.active{border-color:#22c55e;background:#dcfce7;}
.send-method-icon{font-size:20px;display:block;margin-bottom:4px;}
.send-method-label{font-size:12px;font-weight:700;color:var(--text);}
.send-link-box{
  background:white;border:1px solid #86efac;border-radius:8px;
  padding:10px 12px;display:flex;align-items:center;gap:8px;
  margin-top:8px;
}
.send-link-url{
  font-family:'DM Mono',monospace;font-size:12px;color:#166534;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.copy-btn{
  padding:6px 12px;background:#166534;color:white;border:none;
  border-radius:6px;font-family:'Outfit',sans-serif;font-size:12px;
  font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.copy-btn:hover{background:#14532d;}
.scheduler-status{
  font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;
}
.scheduler-online{background:#dcfce7;color:#166534;}
.scheduler-offline{background:#fee2e2;color:#991b1b;}
.scheduler-loading{background:#f3f4f6;color:#6b7280;}
</style>

function printEstimate(estimate){
  const lineTotal=(estimate.lineItems||[]).reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const finalTotal=estimate.overrideTotal!=null&&estimate.overrideTotal!==''
    ?parseFloat(estimate.overrideTotal)||lineTotal
    :lineTotal;
  const isOverridden=estimate.overrideTotal!=null&&parseFloat(estimate.overrideTotal)!==lineTotal;

  const validUntil=()=>{
    const d=new Date(estimate.created);
    d.setDate(d.getDate()+(parseInt(estimate.validDays)||30));
    return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  };

<html lang="en"><head><meta charset="UTF-8">
<title>Estimate — ${estimate.customerName||'Client'}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Outfit',sans-serif;background:#fff;color:#1C2330;font-size:14px;line-height:1.6;}
  .page{max-width:760px;margin:0 auto;padding:40px 48px;}
  /* Header */
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;padding-bottom:24px;border-bottom:3px solid #0A1F4D;}
  .logo-area img{height:72px;width:auto;object-fit:contain;}
  .logo-area .tagline{font-size:11px;color:#4A5568;margin-top:4px;letter-spacing:.4px;}
  .doc-info{text-align:right;}
  .doc-title{font-size:28px;font-weight:800;color:#0A1F4D;letter-spacing:-1px;}
  .doc-number{font-family:'DM Mono',monospace;font-size:12px;color:#718096;margin-top:2px;}
  .doc-date{font-size:12px;color:#4A5568;margin-top:4px;}
  /* Client + meta strip */
  .meta-strip{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}
  .meta-block label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#718096;display:block;margin-bottom:4px;}
  .meta-block .value{font-size:15px;font-weight:600;color:#1C2330;}
  .meta-block .value.mono{font-family:'DM Mono',monospace;font-size:14px;}
  .meta-block .sub{font-size:12px;color:#4A5568;margin-top:1px;}
  /* Line items */
  .section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#718096;margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;margin-bottom:4px;}
  thead tr{background:#0A1F4D;color:#fff;}
  thead th{padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:left;}
  thead th:last-child{text-align:right;}
  tbody tr{border-bottom:1px solid #E1E4E8;}
  tbody tr:nth-child(even){background:#FAFBFC;}
  tbody td{padding:10px 14px;font-size:14px;color:#1C2330;}
  tbody td:last-child{text-align:right;font-family:'DM Mono',monospace;font-weight:600;}
  /* Totals */
  .totals-area{display:flex;justify-content:flex-end;margin-top:16px;}
  .totals-box{background:linear-gradient(135deg,#0A1F4D 0%,#1A3A7A 100%);color:#fff;border-radius:10px;padding:20px 28px;min-width:260px;}
  .totals-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:14px;}
  .totals-row:last-child{border-bottom:none;padding-top:12px;margin-top:6px;font-size:22px;font-weight:800;}
  .totals-row .lbl{opacity:.8;}
  .totals-row .val{font-family:'DM Mono',monospace;font-weight:700;}
  /* Notes */
  .notes-block{background:#FAFBFC;border:1px solid #E1E4E8;border-radius:8px;padding:14px 18px;margin-top:24px;}
  .notes-block label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#718096;display:block;margin-bottom:6px;}
  /* Terms */
  .terms{margin-top:28px;padding-top:20px;border-top:1px solid #E1E4E8;}
  .terms p{font-size:11px;color:#718096;line-height:1.7;}
  /* Valid */
  .valid-badge{display:inline-flex;align-items:center;gap:6px;background:#D1FAE5;color:#065F46;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px;}

  .footer .page-num{font-size:11px;color:#A0AEC0;}

// ── Smart pricing: match by project type NAME (case-insensitive) ──────────────
function calculateSmartPricing(projectTypeName,sqft,historicalJobs,schedulerProjectTypes){
  if(!historicalJobs||historicalJobs.length===0||!sqft||sqft<=0) return null;
  const sqftNum=parseFloat(sqft);
  if(!sqftNum) return null;

  // Build a name→id map from the scheduler's project types
  const nameToIds={};
  (schedulerProjectTypes||[]).forEach(pt=>{
    const key=(pt.name||'').toLowerCase().trim();
    if(!nameToIds[key]) nameToIds[key]=[];
    nameToIds[key].push(pt.id);
  });

  // Also do a loose keyword match for interior/exterior/commercial
  const KEYWORD_MAP={
    interior:['interior','int','inside','indoor'],
    exterior:['exterior','ext','outside','outdoor'],
    commercial:['commercial','comm','office','store','retail'],
  };

  const matchesType=(job)=>{
    const ptName=(projectTypeName||'').toLowerCase().trim();
    // Direct name match against scheduler project types
    const matchIds=nameToIds[ptName]||[];
    if(matchIds.length>0&&matchIds.includes(job.projectTypeId)) return true;
    // Keyword match — find scheduler types whose name contains the keyword
    const keywords=KEYWORD_MAP[ptName]||[ptName];
    return (schedulerProjectTypes||[]).some(pt=>{
      if(!job.projectTypeId||job.projectTypeId!==pt.id) return false;
      return keywords.some(kw=>(pt.name||'').toLowerCase().includes(kw));
    });
  };

  const relevant=historicalJobs.filter(j=>{
    if(j.status!=='completed') return false;
    const amt=parseFloat(j.contractAmount)||0;
    const sf=parseFloat(j.sqft)||0;
    if(amt<=0||sf<=0) return false;
    return matchesType(j);
  });

  if(relevant.length===0) return null;

  const pricesPerSqft=relevant.map(j=>(parseFloat(j.contractAmount)||0)/(parseFloat(j.sqft)||1));
  pricesPerSqft.sort((a,b)=>a-b);
  const min=pricesPerSqft[0];
  const max=pricesPerSqft[pricesPerSqft.length-1];
  const avg=pricesPerSqft.reduce((a,b)=>a+b,0)/pricesPerSqft.length;
  // Suggested = avg, nudged slightly above median for new jobs
  const mid=pricesPerSqft[Math.floor(pricesPerSqft.length/2)];
  const suggested=((avg+mid)/2)*sqftNum;

  return{
    min:min*sqftNum,
    max:max*sqftNum,
    avg:avg*sqftNum,
    suggested:Math.round(suggested/5)*5, // round to nearest $5
    count:relevant.length,
    jobs:relevant.slice(0,5).map(j=>({name:j.name||j.address||'Job',amount:j.contractAmount,sqft:j.sqft}))
  };
}

// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null); // {username,name}
  const[estimates,setEstimates]=useState([]);
  const[showNewModal,setShowNewModal]=useState(false);
  const[viewEstimate,setViewEstimate]=useState(null);
  const[schedulerData,setSchedulerData]=useState(null);
  const[schedulerStatus,setSchedulerStatus]=useState('loading');
  const[loading,setLoading]=useState(true);

  // Check for ?view= param — allow viewing shared estimates without login
  const viewParam=new URLSearchParams(window.location.search).get('view');

  useEffect(()=>{
    // Restore session from sessionStorage
    try{
      const s=sessionStorage.getItem('anaya_est_session');
      if(s) setSession(JSON.parse(s));
    }catch(e){}
    loadAll();
  },[]);

  useEffect(()=>{
    if(viewParam&&estimates.length>0){
      const est=estimates.find(e=>e.id===viewParam);
      if(est) setViewEstimate(est);
    }
  },[estimates,viewParam]);

  const handleLogin=(user)=>{
    setSession(user);
    try{ sessionStorage.setItem('anaya_est_session',JSON.stringify(user)); }catch(e){}
  };

  const handleLogout=()=>{
    setSession(null);
    try{ sessionStorage.removeItem('anaya_est_session'); }catch(e){}
  };

  const loadAll=async()=>{
    try{
      const res=await fetch(`${RAILWAY_URL}/load?key=${ESTIMATES_KEY}`);
      if(res.ok){
        const json=await res.json();
        const d=json.data||json;
        setEstimates(d.estimates||[]);
      }
    }catch(e){ console.warn('Estimates load failed',e); }

    try{
      const res=await fetch(`${RAILWAY_URL}/load?key=${SCHEDULER_KEY}`);
      if(res.ok){
        const json=await res.json();
        const d=json.data||json;
        setSchedulerData(d);
        setSchedulerStatus('online');
      } else {
        setSchedulerStatus('offline');
      }
    }catch(e){
      console.warn('Scheduler fetch failed',e);
      setSchedulerStatus('offline');
    }

    setLoading(false);
  };

  const saveEstimates=async(newEstimates)=>{
    setEstimates(newEstimates);
    try{
      await fetch(`${RAILWAY_URL}/save`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({key:ESTIMATES_KEY,data:{estimates:newEstimates,lastSync:new Date().toISOString()},savedBy:session?session.name:'Estimates App'})
      });
    }catch(e){ console.warn('Save failed',e); }
  };

  const addEstimate=(est)=>{
    const newEst={...est,id:Date.now().toString(),created:new Date().toISOString(),status:'draft'};
    saveEstimates([...estimates,newEst]);
    setShowNewModal(false);
  };

  const updateEstimate=(id,updates)=>{
    const updated=estimates.map(e=>e.id===id?{...e,...updates}:e);
    saveEstimates(updated);
    if(viewEstimate&&viewEstimate.id===id) setViewEstimate(v=>({...v,...updates}));
  };

  const deleteEstimate=(id)=>{
    if(confirm('Delete this estimate?')){
      saveEstimates(estimates.filter(e=>e.id!==id));
      setViewEstimate(null);
    }
  };

  // If there's a ?view= link, show the estimate directly (no login needed for clients)
  if(viewParam&&!session){
    if(loading) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',fontFamily:'Outfit,sans-serif',color:'#4A5568'}},'Loading estimate…');
    const est=estimates.find(e=>e.id===viewParam);
    if(!est) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',fontFamily:'Outfit,sans-serif',color:'#4A5568'}},'Estimate not found.');
    // Show read-only client view
    return h(ClientEstimateView,{estimate:est});
  }

  // Not logged in — show login page
  if(!session) return h(LoginPage,{onLogin:handleLogin,schedulerUsers:(schedulerData&&schedulerData.users)||[]});

  const historicalJobs=(schedulerData&&schedulerData.jobs)||[];
  const schedulerProjectTypes=(schedulerData&&schedulerData.projectTypes)||[];

  const statusBadge=()=>{
    if(schedulerStatus==='loading') return h('span',{className:'scheduler-status scheduler-loading'},'⏳ Connecting…');
    if(schedulerStatus==='online'){
      const completed=historicalJobs.filter(j=>j.status==='completed'&&(j.contractAmount||0)>0&&(j.sqft||0)>0).length;
      return h('span',{className:'scheduler-status scheduler-online'},'✓ Scheduler live · '+completed+' priced jobs');
    }
    return h('span',{className:'scheduler-status scheduler-offline'},'⚠ Scheduler offline');
  };

  return h('div',{className:'app'},
    h('nav',{className:'navbar'},
      h('div',{className:'nav-brand'},
        h('img',{src:ANAYA_LOGO,alt:"Anaya's",style:{height:'48px',objectFit:'contain',marginRight:'10px'}}),
        "Anaya's Estimates"
      ),
      h('div',{className:'nav-actions'},
        statusBadge(),
        h('span',{style:{fontSize:'13px',color:'rgba(255,255,255,0.7)',marginLeft:'8px'}},session.name),
        h('button',{
          className:'btn btn-ghost',
          onClick:handleLogout,
          style:{fontSize:'12px',padding:'6px 12px',marginLeft:'4px'}
        },'Sign Out'),
        h('button',{className:'btn btn-primary',onClick:()=>setShowNewModal(true)},'+ New Estimate')
      )
    ),
    h('div',{className:'container'},
      h('div',{className:'header'},
        h('h1',{className:'header-title'},'Estimates'),
        h('p',{className:'header-subtitle'},'Smart pricing powered by your real job history from the scheduler')
      ),
      loading
        ?h('div',{style:{textAlign:'center',padding:'60px',color:'var(--text3)'}},'Loading…')
        :estimates.length===0
          ?h('div',{className:'empty-state'},
              h('div',{className:'empty-state-icon'},'📋'),
              h('h2',{className:'empty-state-title'},'No estimates yet'),
              h('p',{className:'empty-state-text'},'Create your first estimate to get started'),
              h('button',{className:'btn btn-primary',onClick:()=>setShowNewModal(true)},'Create Estimate')
            )
          :h('div',{className:'grid grid-2'},
              estimates.map(est=>h(EstimateCard,{key:est.id,estimate:est,
                onClick:()=>setViewEstimate(est),onDelete:deleteEstimate}))
            )
    ),
    showNewModal&&h(NewEstimateModal,{
      onClose:()=>setShowNewModal(false),
      onSave:addEstimate,
      historicalJobs,
      schedulerProjectTypes
    }),
    viewEstimate&&h(ViewEstimateModal,{
      estimate:viewEstimate,
      onClose:()=>setViewEstimate(null),
      onUpdate:updateEstimate,
      onDelete:deleteEstimate
    })
  );
}

        const updated=[...prev];
        if(updated[0]&&(parseFloat(updated[0].rate)||0)===0){
          updated[0]={...updated[0],rate:pricing.suggested,total:(parseFloat(updated[0].quantity)||1)*pricing.suggested};
        }
        return updated;
      });
    }
  },[pricing?.suggested]);

  const addLineItem=()=>setLineItems(l=>[...l,{description:'',quantity:1,rate:0,total:0}]);
  const removeLineItem=idx=>setLineItems(l=>l.filter((_,i)=>i!==idx));
  const updateLineItem=(idx,field,value)=>{
    setLineItems(prev=>{
      const updated=[...prev];
      updated[idx]={...updated[idx],[field]:value};
      if(field==='quantity'||field==='rate'){
        updated[idx].total=(parseFloat(updated[idx].quantity)||0)*(parseFloat(updated[idx].rate)||0);
      }
      return updated;
    });
  };

  const lineTotal=lineItems.reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const finalTotal=isOverriding&&overrideTotal!==''?parseFloat(overrideTotal)||lineTotal:lineTotal;

  const handleSave=()=>{
    if(!customerName.trim()){ alert('Please enter a customer name'); return; }
    onSave({
      customerName:customerName.trim(),
      customerPhone:customerPhone.trim(),
      customerEmail:customerEmail.trim(),
      address,sqft:parseFloat(sqft)||0,projectType,
      lineItems,notes,validDays,
      overrideTotal:isOverriding&&overrideTotal!==''?parseFloat(overrideTotal)||null:null,
      overrideReason:isOverriding?overrideReason:'',
      suggestedTotal:pricing?pricing.suggested:null
    });
  };

  // Build project type options from scheduler + fallback defaults
  const ptOptions=schedulerProjectTypes.length>0
    ?schedulerProjectTypes.map(pt=>h('option',{key:pt.id,value:pt.name},(pt.icon?pt.icon+' ':'')+pt.name))
    :[
        h('option',{key:'i',value:'interior'},'Interior'),
        h('option',{key:'e',value:'exterior'},'Exterior'),
        h('option',{key:'c',value:'commercial'},'Commercial'),
      ];

  return h('div',{className:'modal-overlay',onClick:onClose},
    h('div',{className:'modal',style:{maxWidth:'680px'},onClick:e=>e.stopPropagation()},
      h('div',{className:'modal-header'},
        h('div',{className:'modal-title'},'New Estimate'),
        h('button',{className:'modal-close',onClick:onClose},'×')
      ),
      h('div',{className:'modal-body'},

        // ── Customer info ──────────────────────────────────────────────────
        h('div',{className:'grid grid-2'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Customer Name *'),
            h('input',{className:'form-input',value:customerName,onChange:e=>setCustomerName(e.target.value),placeholder:'John Smith',autoFocus:true})
          ),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Address'),
            h('input',{className:'form-input',value:address,onChange:e=>setAddress(e.target.value),placeholder:'123 Main St'})
          )
        ),
        h('div',{className:'grid grid-2'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Phone (for SMS link)'),
            h('input',{className:'form-input',type:'tel',value:customerPhone,onChange:e=>setCustomerPhone(e.target.value),placeholder:'(555) 000-0000'})
          ),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Email (for email link)'),
            h('input',{className:'form-input',type:'email',value:customerEmail,onChange:e=>setCustomerEmail(e.target.value),placeholder:'client@email.com'})
          )
        ),

        // ── Project info ───────────────────────────────────────────────────
        h('div',{className:'grid grid-2'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Square Feet'),
            h('input',{type:'number',className:'form-input',value:sqft,onChange:e=>setSqft(e.target.value),placeholder:'2000'})
          ),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Project Type'),
            h('select',{className:'form-select',value:projectType,onChange:e=>setProjectType(e.target.value)},
              h('option',{value:''},'Select type…'),
              ...ptOptions
            )
          )
        ),

        // ── Smart pricing box ──────────────────────────────────────────────
        projectType&&sqft?(
          pricing
            ?h('div',{className:'pricing-box'},
                h('div',{className:'pricing-box-header'},'🧠 Smart Pricing · '+pricing.count+' similar completed job'+(pricing.count===1?'':'s')),
                h('div',{className:'pricing-stats'},
                  h('div',{className:'pricing-stat'},h('div',{className:'pricing-stat-label'},'Low'),h('div',{className:'pricing-stat-value'},fmt(pricing.min))),
                  h('div',{className:'pricing-stat'},h('div',{className:'pricing-stat-label'},'Avg'),h('div',{className:'pricing-stat-value'},fmt(pricing.avg))),
                  h('div',{className:'pricing-stat'},h('div',{className:'pricing-stat-label'},'High'),h('div',{className:'pricing-stat-value'},fmt(pricing.max)))
                ),
                h('div',{className:'suggested-price-row'},
                  h('span',{className:'suggested-price-label'},'💰 Suggested Total:'),
                  isOverriding
                    ?h('input',{
                        type:'number',step:'50',
                        style:{fontFamily:'DM Mono,monospace',fontSize:'20px',fontWeight:'800',color:'#7c3aed',
                               border:'2px solid #c4b5fd',borderRadius:'8px',padding:'4px 10px',width:'160px',outline:'none'},
                        value:overrideTotal,
                        onChange:e=>setOverrideTotal(e.target.value),
                        placeholder:pricing.suggested.toFixed(0)
                      })
                    :h('span',{className:'suggested-price-value'},fmt(pricing.suggested)),
                  h('button',{
                    className:'override-toggle'+(isOverriding?' override-active':''),
                    onClick:()=>{setIsOverriding(v=>!v);if(isOverriding){setOverrideTotal('');setOverrideReason('');}}
                  },isOverriding?'✕ Cancel Override':'✏ Override')
                ),
                isOverriding&&h('div',{style:{marginTop:'8px'}},
                  h('input',{className:'form-input',value:overrideReason,
                    onChange:e=>setOverrideReason(e.target.value),
                    placeholder:'Reason for override (e.g. Family discount, loyal client…)',
                    style:{fontSize:'13px',padding:'8px 12px'}
                  })
                ),
                !isOverriding&&h('div',{className:'override-note'},'ℹ Based on $/sqft from your past '+projectType+' jobs. Override if needed for discounts or special cases.')
              )
            :h('div',{className:'no-history-box'},
                '📊 No completed '+projectType+' jobs with contract amounts yet — pricing suggestion will appear once you have history in the scheduler.'
              )
        ):null,

        // ── Line items ─────────────────────────────────────────────────────
        h('div',{className:'line-items'},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
            h('label',{className:'form-label',style:{marginBottom:0}},'Line Items'),
            h('button',{className:'btn btn-secondary',onClick:addLineItem,style:{padding:'6px 12px',fontSize:'12px'}},'+ Add Item')
          ),
          h('div',{className:'line-item-header'},
            h('span',null,'Description'),h('span',null,'Qty'),h('span',null,'Rate / Total'),h('span',null,'')
          ),
          lineItems.map((item,idx)=>h('div',{key:idx,className:'line-item'},
            h('input',{className:'form-input',value:item.description,onChange:e=>updateLineItem(idx,'description',e.target.value),placeholder:'Labor, materials…'}),
            h('input',{type:'number',className:'form-input',value:item.quantity,onChange:e=>updateLineItem(idx,'quantity',e.target.value),min:0,step:'0.5'}),
            h('input',{type:'number',step:'0.01',className:'form-input',value:item.rate,onChange:e=>updateLineItem(idx,'rate',e.target.value),placeholder:'$0.00'}),
            lineItems.length>1?h('button',{className:'remove-btn',onClick:()=>removeLineItem(idx)},'×'):h('span',null)
          ))
        ),

        // ── Totals ─────────────────────────────────────────────────────────
        h('div',{className:'totals'},
          lineTotal!==finalTotal&&h('div',{className:'totals-row'},
            h('span',{className:'totals-label'},'Line Items Total'),
            h('span',{className:'totals-value',style:{opacity:.7,textDecoration:'line-through'}},fmt(lineTotal))
          ),
          h('div',{className:'totals-row'},
            h('span',{className:'totals-label'},isOverriding?'Final Total (Overridden)':'Total'),
            h('span',{className:'totals-value',style:{color:isOverriding?'#c4b5fd':'white'}},fmt(finalTotal))
          )
        ),

        h('div',{className:'form-group',style:{marginTop:'16px'}},
          h('label',{className:'form-label'},'Notes'),
          h('textarea',{className:'form-input',value:notes,onChange:e=>setNotes(e.target.value),placeholder:'Scope of work, exclusions, payment terms…',style:{minHeight:'80px'}})
        ),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Valid for (days)'),
          h('input',{type:'number',className:'form-input',value:validDays,onChange:e=>setValidDays(e.target.value),style:{maxWidth:'120px'}})
        )
      ),
      h('div',{className:'modal-footer'},
        h('button',{className:'btn btn-ghost',onClick:onClose},'Cancel'),
        h('button',{className:'btn btn-primary',onClick:handleSave},'Create Estimate')
      )
    )
  );
}

// ── View / Send Estimate Modal ────────────────────────────────────────────────
function ViewEstimateModal({estimate,onClose,onUpdate,onDelete}){
  const lineTotal=estimate.lineItems?.reduce((s,i)=>s+(parseFloat(i.total)||0),0)||0;
  const finalTotal=estimate.overrideTotal!=null&&estimate.overrideTotal!==''
    ?parseFloat(estimate.overrideTotal)||lineTotal
    :lineTotal;
  const isOverridden=estimate.overrideTotal!=null&&parseFloat(estimate.overrideTotal)!==lineTotal;

  const[sendMethod,setSendMethod]=useState(null); // null|'email'|'sms'|'link'
  const[copied,setCopied]=useState(false);
  const shareUrl=estimateShareLink(estimate.id);

  const copyLink=()=>{
    navigator.clipboard.writeText(shareUrl).then(()=>{
      setCopied(true);setTimeout(()=>setCopied(false),2500);
    });
  };

  const phone=estimate.customerPhone||'';
  const email=estimate.customerEmail||'';
  const name=estimate.customerName||'Customer';
  const msg=encodeURIComponent(`Hi ${name}, here's your painting estimate from Anaya's Build & Finish: ${shareUrl}`);
  const smsHref=`sms:${phone}?body=${msg}`;
  const emailSubject=encodeURIComponent(`Your Estimate from Anaya's Build & Finish Painting`);
  const emailBody=encodeURIComponent(`Hi ${name},\n\nPlease find your estimate here:\n${shareUrl}\n\nTotal: ${fmt(finalTotal)}\nValid for ${estimate.validDays||30} days.\n\nThank you,\nAnaya's Build & Finish Painting`);
  const emailHref=`mailto:${email}?subject=${emailSubject}&body=${emailBody}`;

  const markSent=()=>onUpdate(estimate.id,{status:'sent',sentDate:new Date().toISOString()});
  const markApproved=()=>onUpdate(estimate.id,{status:'approved',approvedDate:new Date().toISOString()});

  const statusColors={draft:'badge-draft',sent:'badge-sent',viewed:'badge-viewed',approved:'badge-approved',declined:'badge-declined'};

  return h('div',{className:'modal-overlay',onClick:onClose},
    h('div',{className:'modal',style:{maxWidth:'640px'},onClick:e=>e.stopPropagation()},
      h('div',{className:'modal-header'},
        h('div',null,
          h('div',{className:'modal-title'},estimate.customerName||'Estimate'),
          h('div',{style:{fontSize:'13px',color:'var(--text3)',marginTop:'4px'}},estimate.address||'')
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          h('span',{className:'card-badge '+(statusColors[estimate.status]||'badge-draft')},estimate.status),
          h('button',{className:'modal-close',onClick:onClose},'×')
        )
      ),
      h('div',{className:'modal-body'},

        // ── Contact info ───────────────────────────────────────────────────
        (estimate.customerPhone||estimate.customerEmail)&&h('div',{style:{display:'flex',gap:'16px',marginBottom:'16px',flexWrap:'wrap'}},
          estimate.customerPhone&&h('div',{style:{fontSize:'13px',color:'var(--text2)'}},
            h('span',{style:{color:'var(--text3)',fontWeight:700,marginRight:'4px'}},'📱'),estimate.customerPhone
          ),
          estimate.customerEmail&&h('div',{style:{fontSize:'13px',color:'var(--text2)'}},
            h('span',{style:{color:'var(--text3)',fontWeight:700,marginRight:'4px'}},'✉️'),estimate.customerEmail
          )
        ),

        // ── Line items ─────────────────────────────────────────────────────
        h('div',{style:{marginBottom:'16px'}},
          h('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'8px'}},'Line Items'),
          estimate.lineItems?.map((item,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}},
            h('span',{style:{fontSize:'14px'}},item.description||'—'),
            h('span',{style:{fontFamily:'DM Mono,monospace',fontWeight:600,fontSize:'14px'}},fmt(item.total||0))
          ))
        ),

        // ── Totals ─────────────────────────────────────────────────────────
        h('div',{className:'totals'},
          isOverridden&&h('div',{className:'totals-row'},
            h('span',{className:'totals-label'},'Line Items'),
            h('span',{className:'totals-value',style:{opacity:.6,textDecoration:'line-through',fontSize:'14px'}},fmt(lineTotal))
          ),
          h('div',{className:'totals-row'},
            h('span',null,isOverridden?'Final Total (Custom)':'Total'),
            h('span',null,fmt(finalTotal))
          )
        ),

        isOverridden&&estimate.overrideReason&&h('div',{style:{marginTop:'10px',fontSize:'12px',color:'#7c3aed',background:'#f5f3ff',borderRadius:'8px',padding:'8px 12px'}},
          '✏️ Override reason: '+estimate.overrideReason
        ),
        estimate.suggestedTotal&&isOverridden&&h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px',textAlign:'center'}},
          'Suggested was '+fmt(estimate.suggestedTotal)
        ),

        estimate.notes&&h('div',{style:{marginTop:'16px',padding:'12px',background:'var(--bg)',borderRadius:'8px'}},
          h('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--text3)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'.5px'}},'Notes'),
          h('div',{style:{fontSize:'14px',color:'var(--text2)'}},estimate.notes)
        ),

        // ── Send to Client panel ───────────────────────────────────────────
        h('div',{className:'send-panel'},
          h('div',{className:'send-panel-title'},'📤 Send to Client'),
          h('div',{className:'send-method-btns'},
            h('button',{className:'send-method-btn'+(sendMethod==='email'?' active':''),onClick:()=>setSendMethod(sendMethod==='email'?null:'email')},
              h('span',{className:'send-method-icon'},'✉️'),
              h('span',{className:'send-method-label'},'Email')
            ),
            h('button',{className:'send-method-btn'+(sendMethod==='sms'?' active':''),onClick:()=>setSendMethod(sendMethod==='sms'?null:'sms')},
              h('span',{className:'send-method-icon'},'💬'),
              h('span',{className:'send-method-label'},'Text / SMS')
            ),
            h('button',{className:'send-method-btn'+(sendMethod==='link'?' active':''),onClick:()=>setSendMethod(sendMethod==='link'?null:'link')},
              h('span',{className:'send-method-icon'},'🔗'),
              h('span',{className:'send-method-label'},'Copy Link')
            )
          ),

          sendMethod==='email'&&h('div',null,
            !email&&h('div',{style:{fontSize:'12px',color:'#92400e',background:'#fef3c7',borderRadius:'6px',padding:'8px 10px',marginBottom:'8px'}},
              '⚠ No email saved for this customer — add it when editing the estimate, or just copy the link manually.'
            ),
            h('div',{className:'send-link-box'},
              h('span',{className:'send-link-url'},email||'(no email on file)'),
              h('a',{href:emailHref,target:'_blank',style:{textDecoration:'none'}},
                h('button',{className:'copy-btn',onClick:()=>{if(!email) return; markSent();}},email?'Open Email App ↗':'No Email')
              )
            ),
            h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'6px'}},'Opens your email app with a pre-written message and the estimate link already filled in.')
          ),

          sendMethod==='sms'&&h('div',null,
            !phone&&h('div',{style:{fontSize:'12px',color:'#92400e',background:'#fef3c7',borderRadius:'6px',padding:'8px 10px',marginBottom:'8px'}},
              '⚠ No phone number saved for this customer.'
            ),
            h('div',{className:'send-link-box'},
              h('span',{className:'send-link-url'},phone||'(no phone on file)'),
              h('a',{href:smsHref,style:{textDecoration:'none'}},
                h('button',{className:'copy-btn',onClick:()=>{if(phone) markSent();}},phone?'Open Messages ↗':'No Phone')
              )
            ),
            h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'6px'}},'Opens your Messages app with the estimate link pre-loaded. Works best on iPhone / Android.')
          ),

          sendMethod==='link'&&h('div',null,
            h('div',{className:'send-link-box'},
              h('span',{className:'send-link-url'},shareUrl),
              h('button',{className:'copy-btn',onClick:()=>{copyLink();markSent();}},copied?'✓ Copied!':'Copy Link')
            ),
            h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'6px'}},'Paste this anywhere — iMessage, WhatsApp, Facebook, whatever. Client opens it and sees a clean view of the estimate.')
          )
        )
      ),
      h('div',{className:'modal-footer'},
        h('button',{className:'btn btn-ghost',onClick:()=>onDelete(estimate.id),style:{marginRight:'auto',color:'var(--red)',borderColor:'#fecaca'}},'Delete'),
        h('button',{className:'btn btn-secondary',onClick:()=>printEstimate(estimate),style:{background:'#0A1F4D',color:'#fff',border:'none'}},'🖨 Print / Save PDF'),
        estimate.status==='draft'&&h('button',{className:'btn btn-secondary',onClick:markSent},'Mark as Sent'),
        estimate.status==='sent'&&h('button',{className:'btn btn-primary',onClick:markApproved,style:{background:'var(--green)'}},'✓ Mark Approved'),
        h('button',{className:'btn btn-ghost',onClick:onClose},'Close')
      )
    )
  );
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
