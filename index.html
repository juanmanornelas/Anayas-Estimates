// ── View / Send Estimate Modal ────────────────────────────────────────────────
function ViewEstimateModal({estimate,onClose,onUpdate,onDelete,onDuplicate,onSaveTemplate,onAddNote,session}){
  const lineTotal=estimate.lineItems?.reduce((s,i)=>s+(parseFloat(i.total)||0),0)||0;
  const finalTotal=estimate.overrideTotal!=null&&estimate.overrideTotal!==''
    ?parseFloat(estimate.overrideTotal)||lineTotal
    :lineTotal;
  const isOverridden=estimate.overrideTotal!=null&&parseFloat(estimate.overrideTotal)!==lineTotal;

  const[activeTab,setActiveTab]=useState('overview');
  const[sendMethod,setSendMethod]=useState(null);
  const[copied,setCopied]=useState(false);
  const[noteText,setNoteText]=useState('');
  const[savingTemplate,setSavingTemplate]=useState(false);
  const[templateName,setTemplateName]=useState('');
  const shareUrl=estimateShareLink(estimate.id);

  const STATUS_FLOW=['draft','sent','approved','declined'];
  const STATUS_LABEL={draft:'Draft',sent:'Sent',viewed:'Viewed',approved:'Approved',declined:'Declined'};

  const copyLink=()=>{
    navigator.clipboard.writeText(shareUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  };
  const phone=estimate.customerPhone||'';
  const email=estimate.customerEmail||'';
  const name=estimate.customerName||'Customer';
  const msg=encodeURIComponent(`Hi ${name}, here's your estimate from Anaya's Build & Finish Painting:\n${shareUrl}\nTotal: ${fmt(finalTotal)}\nValid ${estimate.validDays||30} days.`);
  const smsHref=`sms:${phone}?body=${msg}`;
  const emailSubject=encodeURIComponent(`Your Estimate #EST-${estimate.estNumber||''} from Anaya's Build & Finish Painting`);
  const emailBody=encodeURIComponent(`Hi ${name},\n\nPlease review your estimate here:\n${shareUrl}\n\nEstimate: #EST-${estimate.estNumber||''}\nTotal: ${fmt(finalTotal)}\nValid for ${estimate.validDays||30} days.\n\nYou can approve and sign the estimate directly from that link.\n\nThank you,\nAnaya's Build & Finish Painting\n(951) 000-0000`);
  const emailHref=`mailto:${email}?subject=${emailSubject}&body=${emailBody}`;
  const isGmail=email&&(email.includes('@gmail')||email.includes('@googlemail'));
  const gmailUrl=`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(email)}&su=${emailSubject}&body=${emailBody}`;
  const whatsappUrl=`https://wa.me/${phone.replace(/\D/g,'')}?text=${msg}`;

  const setStatus=(s)=>{
    const updates={status:s};
    if(s==='sent') updates.sentDate=new Date().toISOString();
    if(s==='approved') updates.approvedDate=new Date().toISOString();
    onUpdate(estimate.id,updates);
  };

  const submitNote=()=>{
    if(!noteText.trim()) return;
    onAddNote(noteText.trim());
    setNoteText('');
  };

  const tabs=[
    {id:'overview',label:'📋 Overview'},
    {id:'send',label:'📤 Send'},
    {id:'signature',label:'✍️ Signature'},
    {id:'notes',label:'🗒 Notes'+(estimate.internalNotes?.length?` (${estimate.internalNotes.length})`:'')},
  ];

  return h('div',{className:'modal-overlay',onClick:onClose},
    h('div',{className:'modal',style:{maxWidth:'660px',maxHeight:'92vh',display:'flex',flexDirection:'column'},onClick:e=>e.stopPropagation()},

      // ── Header ──
      h('div',{className:'modal-header',style:{flexShrink:0}},
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
            h('div',{className:'modal-title'},estimate.customerName||'Estimate'),
            estimate.estNumber&&h('span',{style:{fontFamily:'DM Mono,monospace',fontSize:'12px',color:'var(--text3)',fontWeight:400}},'#EST-'+estimate.estNumber)
          ),
          estimate.address&&h('div',{style:{fontSize:'13px',color:'var(--text3)',marginTop:'2px'}},estimate.address)
        ),
        h('button',{className:'modal-close',onClick:onClose},'×')
      ),

      // ── Status progress bar ──
      h('div',{style:{padding:'12px 24px',borderBottom:'1px solid var(--border)',flexShrink:0}},(()=>{
        const STEPS=[
          {key:'draft',  label:'Draft',    icon:'📋', desc:'Created'},
          {key:'sent',   label:'Sent',     icon:'📤', desc:'Sent to client'},
          {key:'viewed', label:'Viewed',   icon:'👁',  desc:'Client opened'},
          {key:'approved',label:'Approved',icon:'✅', desc:estimate.signature?'Signed':'Approved'},
        ];
        const ORDER={draft:0,sent:1,viewed:2,approved:3,declined:4};
        const currentIdx=ORDER[estimate.status]??0;
        const declined=estimate.status==='declined';

        if(declined) return h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0'}},
          h('span',{style:{fontSize:'20px'}},'🚫'),
          h('div',null,
            h('div',{style:{fontWeight:800,color:'#dc2626',fontSize:'13px'}},'Declined'),
            h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},'This estimate was not accepted'),
          ),
          h('button',{
            onClick:()=>setStatus('draft'),
            style:{marginLeft:'auto',fontSize:'11px',padding:'4px 10px',borderRadius:'20px',border:'1px solid var(--border)',background:'var(--bg)',cursor:'pointer',color:'var(--text3)'}
          },'↩ Reopen as Draft')
        );

        return h('div',null,
          // Step indicators
          h('div',{style:{display:'flex',alignItems:'center',position:'relative'}},
            STEPS.map((step,i)=>{
              const done=i<currentIdx;
              const active=i===currentIdx;
              const locked=i>currentIdx;
              return h('div',{key:step.key,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',position:'relative'}},
                // Connector line
                i>0&&h('div',{style:{
                  position:'absolute',left:'-50%',top:'14px',width:'100%',height:'2px',
                  background:done?'#059669':'var(--border)',
                  transition:'background .3s'
                }}),
                // Circle
                h('div',{style:{
                  width:'28px',height:'28px',borderRadius:'50%',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:'13px',fontWeight:800,position:'relative',zIndex:1,
                  background:active?'var(--navy)':done?'#059669':'var(--bg)',
                  border:'2px solid '+(active?'var(--navy)':done?'#059669':'var(--border)'),
                  color:active||done?'#fff':'var(--text3)',
                  cursor: step.key==='approved'||step.key==='viewed' ? 'default' : (locked?'default':'pointer'),
                  transition:'all .2s'
                }},
                  done?'✓':active?h('span',{style:{fontSize:'11px'}},i+1):h('span',{style:{fontSize:'11px'}},i+1)
                ),
                // Label
                h('div',{style:{marginTop:'5px',fontSize:'10px',fontWeight:active?800:600,
                  color:active?'var(--navy)':done?'#059669':'var(--text3)',
                  textAlign:'center',whiteSpace:'nowrap'
                }},step.label)
              );
            })
          ),
          // Current step description + action
          h('div',{style:{marginTop:'10px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'6px'}},
            h('div',{style:{fontSize:'12px',color:'var(--text3)',lineHeight:'1.5'}},
              currentIdx===0&&'Ready to send to client.',
              currentIdx===1&&('Sent '+(estimate.sentDate?new Date(estimate.sentDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'')+(estimate.firstViewedAt?' · Viewed '+estimate.viewCount+'×':' · Not yet opened')),
              currentIdx===2&&('Client opened '+(estimate.viewCount||1)+'× · Awaiting signature'),
              currentIdx===3&&estimate.signature&&('Signed by '+estimate.signedBy+' · '+new Date(estimate.signedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})),
              currentIdx===3&&!estimate.signature&&'Approved manually'
            ),
            h('div',{style:{display:'flex',gap:'6px'}},
              // Decline button always available
              estimate.status!=='declined'&&estimate.status!=='draft'&&h('button',{
                onClick:()=>{if(confirm('Mark this estimate as Declined?'))setStatus('declined');},
                style:{fontSize:'11px',padding:'3px 10px',borderRadius:'20px',border:'1px solid #fecaca',
                  background:'#fff',cursor:'pointer',color:'#dc2626',fontWeight:700}
              },'✕ Decline'),
              // Next step button
              currentIdx===0&&h('button',{
                className:'btn btn-primary',
                style:{fontSize:'11px',padding:'4px 12px'},
                onClick:()=>setActiveTab('send')
              },'Send to Client →'),
              currentIdx===1&&h('button',{
                style:{fontSize:'11px',padding:'4px 12px',borderRadius:'20px',border:'1px solid var(--border)',background:'var(--bg)',cursor:'pointer',color:'var(--text3)',fontWeight:700},
                onClick:()=>setActiveTab('send')
              },'Resend ↗'),
              currentIdx===2&&h('button',{
                style:{fontSize:'11px',padding:'4px 12px',borderRadius:'20px',border:'1px solid var(--border)',background:'var(--bg)',cursor:'pointer',color:'var(--text3)',fontWeight:700},
                onClick:()=>setActiveTab('send')
              },'Follow up ↗')
            )
          )
        );
      })()),

      // ── Tabs ──
      h('div',{className:'modal-tabs',style:{flexShrink:0}},
        tabs.map(t=>h('button',{
          key:t.id,className:'modal-tab'+(activeTab===t.id?' active':''),
          onClick:()=>setActiveTab(t.id)
        },t.label))
      ),

      // ── Tab body ──
      h('div',{className:'modal-body',style:{flex:1,overflowY:'auto'}},

        // ── OVERVIEW TAB ──
        activeTab==='overview'&&h('div',null,
          (estimate.customerPhone||estimate.customerEmail)&&h('div',{style:{display:'flex',gap:'16px',marginBottom:'16px',flexWrap:'wrap'}},
            estimate.customerPhone&&h('span',{style:{fontSize:'13px',color:'var(--text2)'}},'📱 '+estimate.customerPhone),
            estimate.customerEmail&&h('span',{style:{fontSize:'13px',color:'var(--text2)'}},'✉️ '+estimate.customerEmail)
          ),
          h('div',{style:{marginBottom:'16px'}},
            h('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'8px'}},'Line Items'),
            estimate.lineItems?.map((item,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}},
              h('span',{style:{fontSize:'14px'}},item.description||'—'),
              h('span',{style:{fontFamily:'DM Mono,monospace',fontWeight:600}},fmt(item.total||0))
            ))
          ),
          h('div',{className:'totals'},
            isOverridden&&h('div',{className:'totals-row'},
              h('span',{className:'totals-label'},'Line Items'),
              h('span',{className:'totals-value',style:{opacity:.6,textDecoration:'line-through',fontSize:'14px'}},fmt(lineTotal))
            ),
            h('div',{className:'totals-row'},
              h('span',null,isOverridden?'Final Total (Custom)':'Total'),
              h('span',null,fmt(finalTotal))
            )
          ),
          estimate.notes&&h('div',{style:{marginTop:'16px',padding:'12px',background:'var(--bg)',borderRadius:'8px',border:'1px solid var(--border)'}},
            h('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--text3)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.5px'}},'Scope / Notes'),
            h('div',{style:{fontSize:'14px',color:'var(--text2)',lineHeight:'1.6'}},estimate.notes)
          ),
          h('div',{style:{marginTop:'16px',display:'flex',gap:'8px',flexWrap:'wrap'}},
            h('button',{
              className:'btn btn-ghost',
              onClick:()=>setSavingTemplate(v=>!v),
              style:{fontSize:'12px',padding:'6px 14px'}
            },'💾 Save as Template'),
            savingTemplate&&h('div',{style:{display:'flex',gap:'6px',width:'100%',marginTop:'6px'}},
              h('input',{
                className:'form-input',placeholder:'Template name…',
                value:templateName,onChange:e=>setTemplateName(e.target.value),
                onKeyDown:e=>{if(e.key==='Enter'&&templateName.trim()){onSaveTemplate(estimate,templateName.trim());setTemplateName('');setSavingTemplate(false);alert('Template saved!');}},
                style:{flex:1,fontSize:'13px',padding:'7px 10px'}
              }),
              h('button',{
                className:'btn btn-primary',
                onClick:()=>{if(templateName.trim()){onSaveTemplate(estimate,templateName.trim());setTemplateName('');setSavingTemplate(false);alert('Template saved!');}}
                ,style:{fontSize:'13px',padding:'7px 14px'}
              },'Save')
            )
          )
        ),

        // ── SEND TAB ──
        activeTab==='send'&&h('div',null,
          h('p',{style:{fontSize:'13px',color:'var(--text3)',marginBottom:'16px',lineHeight:'1.6'}},
            'Share the estimate link with your client. They can view and sign it directly from the link — no app needed.'
          ),
          h('div',{style:{display:'flex',gap:'10px',marginBottom:'16px'}},
            h('button',{
              className:'send-method-btn'+(sendMethod==='message'?' active':''),
              onClick:()=>setSendMethod(sendMethod==='message'?null:'message'),
              style:{flex:1}
            },h('span',{className:'send-method-icon'},'💬'),h('span',{className:'send-method-label'},'Message')),
            h('button',{
              className:'send-method-btn'+(sendMethod==='email'?' active':''),
              onClick:()=>setSendMethod(sendMethod==='email'?null:'email'),
              style:{flex:1}
            },h('span',{className:'send-method-icon'},'📧'),h('span',{className:'send-method-label'},isGmail?'Gmail':'Email')),
            h('button',{
              className:'send-method-btn'+(sendMethod==='link'?' active':''),
              onClick:()=>setSendMethod(sendMethod==='link'?null:'link'),
              style:{flex:1}
            },h('span',{className:'send-method-icon'},'🔗'),h('span',{className:'send-method-label'},'Copy Link'))
          ),

          // Message — WhatsApp
          sendMethod==='message'&&h('div',null,
            !phone&&h('div',{style:{fontSize:'12px',color:'#92400e',background:'#fef3c7',borderRadius:'8px',padding:'10px 12px',marginBottom:'10px'}},
              '⚠ No phone number on this estimate — edit it first to add one.'
            ),
            phone&&h('div',null,
              h('div',{className:'send-link-box'},
                h('span',{className:'send-link-url'},phone),
                h('a',{href:whatsappUrl,target:'_blank',style:{textDecoration:'none'}},
                  h('button',{className:'copy-btn',onClick:()=>setStatus('sent')},'Open WhatsApp ↗')
                )
              ),
              h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'8px'}},'Opens WhatsApp with the estimate link and total pre-written. Works on any device.')
            )
          ),

          // Email — Gmail direct or mailto fallback
          sendMethod==='email'&&h('div',null,
            !email&&h('div',{style:{fontSize:'12px',color:'#92400e',background:'#fef3c7',borderRadius:'8px',padding:'10px 12px',marginBottom:'10px'}},
              '⚠ No email on this estimate — edit it first to add one.'
            ),
            email&&h('div',null,
              h('div',{className:'send-link-box'},
                h('span',{className:'send-link-url'},email),
                isGmail
                  ?h('a',{href:gmailUrl,target:'_blank',style:{textDecoration:'none'}},
                      h('button',{className:'copy-btn',style:{background:'#EA4335',border:'none',color:'#fff'},onClick:()=>setStatus('sent')},'Open Gmail ↗')
                    )
                  :h('a',{href:emailHref,target:'_blank',style:{textDecoration:'none'}},
                      h('button',{className:'copy-btn',onClick:()=>setStatus('sent')},'Open Email ↗')
                    )
              ),
              h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'8px'}},
                isGmail
                  ?'Opens Gmail in your browser — full message pre-written, no app picker.'
                  :'Opens your default email app with a professional message pre-filled.'
              )
            )
          ),

          // Copy Link
          sendMethod==='link'&&h('div',null,
            h('div',{className:'send-link-box'},
              h('span',{className:'send-link-url'},shareUrl),
              h('button',{className:'copy-btn',onClick:()=>{copyLink();setStatus('sent');}},copied?'✓ Copied!':'Copy Link')
            ),
            h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'8px'}},'Paste anywhere — WhatsApp, Gmail, iMessage, Messenger. Client taps and sees the full estimate with a Sign button.')
          )
        ),

        // ── SIGNATURE TAB ──
        activeTab==='signature'&&h('div',null,
          estimate.signature
            // ── SIGNED: show read-only signature + approve/schedule actions ──
            ?h('div',null,
                h('div',{style:{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:'12px',padding:'16px 18px',marginBottom:'16px',display:'flex',gap:'12px',alignItems:'flex-start'}},
                  h('span',{style:{fontSize:'28px',flexShrink:0}},'✅'),
                  h('div',null,
                    h('div',{style:{fontWeight:800,color:'#065f46',fontSize:'15px'}},'Client Signed'),
                    h('div',{style:{fontSize:'12px',color:'#047857',marginTop:'2px'}},
                      estimate.signedBy+' · '+new Date(estimate.signedAt).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})
                    ),
                    estimate.viewCount>0&&h('div',{style:{fontSize:'11px',color:'#6b7280',marginTop:'2px'}},
                      'Link opened '+estimate.viewCount+' time'+(estimate.viewCount===1?'':'s')
                    )
                  )
                ),
                // Signature image
                h('div',{style:{border:'1px solid #d1fae5',borderRadius:'10px',overflow:'hidden',background:'#fff',marginBottom:'16px'}},
                  h('div',{style:{padding:'8px 14px',background:'#ecfdf5',borderBottom:'1px solid #d1fae5',fontSize:'10px',fontWeight:800,color:'#065f46',textTransform:'uppercase',letterSpacing:'.6px',display:'flex',justifyContent:'space-between'}},
                    h('span',null,'Client Signature'),
                    h('span',null,estimate.signedBy)
                  ),
                  h('img',{src:estimate.signature,style:{display:'block',width:'100%',maxHeight:'130px',objectFit:'contain',padding:'16px 24px'}})
                ),
                // Legal
                h('div',{style:{padding:'12px 14px',background:'#f8fafc',borderRadius:'8px',fontSize:'12px',color:'var(--text3)',lineHeight:'1.7',marginBottom:'16px'}},
                  h('strong',null,'Legal record: '),
                  'Client confirmed they reviewed and agreed to the full scope, pricing, and payment terms. Signed ',
                  new Date(estimate.signedAt).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}),
                  '.'
                ),
                // Actions
                h('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap'}},
                  estimate.status!=='approved'&&h('button',{
                    className:'btn btn-primary',
                    style:{background:'#059669',border:'none',flex:1},
                    onClick:()=>setStatus('approved')
                  },'✓ Mark Approved'),
                  h('button',{
                    className:'btn btn-primary',
                    style:{background:'var(--navy)',border:'none',flex:1},
                    onClick:()=>{
                      const ft=parseFloat(estimate.overrideTotal)||(estimate.lineItems||[]).reduce((s,i)=>s+(parseFloat(i.total)||0),0);
                      const params=new URLSearchParams({
                        prefill:'1',customerName:estimate.customerName||'',jobName:estimate.customerName||'',
                        address:estimate.address||'',amount:String(ft||''),sqft:String(estimate.sqft||''),
                        projectType:estimate.projectType||'',estNumber:estimate.estNumber||''
                      });
                      window.open('https://anaya-s-calendar.vercel.app?'+params.toString(),'_blank');
                    }
                  },'📅 Send to Scheduler →')
                )
              )
            // ── PENDING: show status info only, no signature pad ──
            :h('div',null,
                h('div',{style:{
                  background:estimate.status==='viewed'?'#eff6ff':'#fafafa',
                  border:'1.5px solid '+(estimate.status==='viewed'?'#bfdbfe':'var(--border)'),
                  borderRadius:'12px',padding:'20px',textAlign:'center',marginBottom:'16px'
                }},
                  h('div',{style:{fontSize:'36px',marginBottom:'10px'}},
                    estimate.status==='viewed'?'👁':estimate.status==='sent'?'📤':'📋'
                  ),
                  h('div',{style:{fontWeight:800,fontSize:'15px',color:'var(--navy)',marginBottom:'6px'}},
                    estimate.status==='viewed'?'Client has viewed the estimate'
                    :estimate.status==='sent'?'Estimate sent — awaiting client review'
                    :'Estimate not yet sent to client'
                  ),
                  h('div',{style:{fontSize:'13px',color:'var(--text3)',lineHeight:'1.6'}},
                    estimate.status==='viewed'
                      ?'Opened '+(estimate.viewCount||1)+' time'+(estimate.viewCount===1?'':'s')+
                        (estimate.firstViewedAt?' · First opened '+new Date(estimate.firstViewedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'')
                      :estimate.status==='sent'
                        ?'Client will see a Sign & Approve button when they open the link.'
                        :'Go to the Send tab to share the estimate link with your client.'
                  )
                ),
                estimate.status==='viewed'&&h('div',{style:{background:'#fefce8',border:'1px solid #fde68a',borderRadius:'10px',padding:'12px 14px',fontSize:'13px',color:'#92400e',lineHeight:'1.6'}},
                  '💡 The client has opened the estimate but has not signed yet. Consider following up — they may have questions.'
                )
              )
        ),

        // ── NOTES TAB ──
        activeTab==='notes'&&h('div',null,
          h('p',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'12px'}},'Internal notes — never shown to the client.'),
          h('div',{className:'note-thread'},
            (!estimate.internalNotes||estimate.internalNotes.length===0)
              ?h('div',{style:{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:'13px'}},'No notes yet. Add the first one below.')
              :[...estimate.internalNotes].reverse().map(n=>
                h('div',{key:n.id,className:'note-item'},
                  h('div',{className:'note-meta'},
                    h('span',{style:{fontWeight:700,color:'var(--navy)'}},n.author),
                    h('span',null,new Date(n.at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}))
                  ),
                  h('div',null,n.text)
                )
              )
          ),
          h('div',{style:{display:'flex',gap:'8px'}},
            h('input',{
              className:'form-input',
              placeholder:'Internal note about this estimate or client…',
              value:noteText,
              onChange:e=>setNoteText(e.target.value),
              onKeyDown:e=>{if(e.key==='Enter')submitNote();},
              style:{flex:1,fontSize:'13px',padding:'8px 12px'}
            }),
            h('button',{
              className:'btn btn-primary',onClick:submitNote,
              style:{padding:'8px 16px',fontSize:'13px',flexShrink:0}
            },'Add')
          )
        )
      ),

      // ── Footer ──
      h('div',{className:'modal-footer',style:{flexWrap:'wrap',gap:'8px',flexShrink:0}},
        h('button',{className:'btn btn-ghost',onClick:()=>onDelete(estimate.id),style:{marginRight:'auto',color:'var(--red)',borderColor:'#fecaca'}},'Delete'),
        h('button',{className:'btn btn-secondary',onClick:()=>onEdit(estimate),style:{background:'var(--bg)',color:'var(--navy)',border:'1px solid var(--border)',fontSize:'13px',padding:'8px 14px'}},'✏️ Edit'),
        h('button',{className:'btn btn-secondary',onClick:()=>onDuplicate(estimate),style:{background:'var(--bg)',color:'var(--navy)',border:'1px solid var(--border)',fontSize:'13px',padding:'8px 14px'}},'⧉ Duplicate'),

        h('button',{className:'btn btn-secondary',onClick:()=>printEstimate(estimate),style:{background:'#0A1F4D',color:'#fff',border:'none'}},'🖨 PDF'),
        h('button',{className:'btn btn-ghost',onClick:onClose},'Close')
      )
    )
  );
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
</body>
</html>
